<!DOCTYPE html>
<html>
<head>
  <title>User Profile</title>

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#0b132b;
      color:white;
    }

    .navbar{
      background:#1c2541;
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    .back-btn{
      position:absolute;
      left:10px;
      background:#5bc0be;
      border:none;
      padding:6px 10px;
      border-radius:6px;
      cursor:pointer;
    }

    .profile-card{
      background:#1c2541;
      margin:12px;
      padding:18px;
      border-radius:16px;
      text-align:center;
    }

    .avatar{
      width:90px;
      height:90px;
      border-radius:50%;
      background:#5bc0be;
      margin:auto;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:40px;
      color:#000;
      font-weight:bold;
    }

    .username{
      font-size:22px;
      margin-top:12px;
      font-weight:bold;
    }

    .bio{
      opacity:0.8;
      margin-top:8px;
      line-height:1.5;
    }

    .stats{
      display:flex;
      justify-content:center;
      gap:20px;
      margin-top:16px;
    }

    .stat{
      text-align:center;
    }

    .actions{
      margin-top:18px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    button{
      padding:10px 16px;
      border:none;
      border-radius:10px;
      background:#5bc0be;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }

    .posts{
      padding:12px;
    }

    .post{
      background:#1c2541;
      padding:14px;
      border-radius:12px;
      margin-bottom:10px;
      cursor:pointer;
    }

    .badge{
      display:inline-block;
      background:#ffcc00;
      color:#000;
      padding:4px 8px;
      border-radius:8px;
      font-size:12px;
      margin-left:6px;
    }

  </style>
</head>

<body>

<div class="navbar">

  <button
    class="back-btn"
    onclick="history.back()"
  >
    ←
  </button>

  <h3>User Profile</h3>

</div>

<div class="profile-card">

  <div class="avatar" id="avatar">
    👤
  </div>

  <div class="username" id="username">
    Loading...
  </div>

  <div class="bio" id="bio">
    Loading profile...
  </div>

  <div class="stats">

    <div class="stat">
      <div id="followers">0</div>
      <small>Followers</small>
    </div>

    <div class="stat">
      <div id="following">0</div>
      <small>Following</small>
    </div>

  </div>

  <div class="actions">

    <button onclick="followUser()">
      ➕ Follow
    </button>

    <button onclick="openDM()">
      ✉️ DM
    </button>

  </div>

</div>

<div class="posts">

  <h3>User Posts</h3>

  <div id="userPosts">
    Loading posts...
  </div>

</div>

<script type="module" src="user.js"></script>

</body>
</html>
