<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Blog Post</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Latest crypto earning guides, referral programs and online income tips.">

  <meta property="og:title" content="MCN Engine Blog">
  <meta property="og:description" content="Earn crypto, discover platforms and grow online income.">
  <meta property="og:type" content="article">
  <meta property="og:image" content="https://via.placeholder.com/600x300">
  <meta property="og:url" content="">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="robots" content="index, follow">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b132b;
      color: #fff;
      line-height: 1.6;
    }

    .header {
      background: #1c2541;
      padding: 15px;
      text-align: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 9999;
    }

    .header h1 {
      margin: 0;
      font-size: 18px;
      color: #5bc0be;
    }

    .container {
      padding: 90px 18px 18px;
      max-width: 750px;
      margin: auto;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      color: #5bc0be;
      margin-bottom: 15px;
    }

    .image {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 18px;
    }

    .content p {
      margin-bottom: 16px;
      font-size: 16px;
      opacity: 0.95;
    }

    .content a {
      color: #5bc0be;
      word-break: break-word;
    }

    .back {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #5bc0be;
      color: #000;
      border: none;
      padding: 12px 16px;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      z-index: 9999;
    }

    .loading {
      text-align: center;
      padding: 50px;
      opacity: 0.7;
    }

    .meta {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>MCN ENGINE</h1>
</div>

<div class="container" id="postContainer">
  <div class="loading">Loading post...</div>
</div>

<button class="back" onclick="goBackSmart()">← Back</button>

<script>

/* ================= GET POST ID ================= */
function getPostId() {

  const params =
    new URLSearchParams(window.location.search);

  return params.get("id");
}

/* ================= SMART BACK ================= */
function goBackSmart() {

  const ref = document.referrer;

  if (ref && ref.includes("dashboard.html")) {
    window.location.href = "dashboard.html";
    return;
  }

  if (window.history.length > 1) {
    window.history.back();
    return;
  }

  window.location.href = "index.html";
}

/* ================= FORMAT CONTENT ================= */
function formatContent(text) {

  if (!text) return "";

  return text

    .replace(/[\u200B-\u200D\uFEFF\uFFFD]/g, "")

    .replace(
      /(https?:\/\/[^\s]+)/g,
      '<a href="$1" target="_blank">$1</a>'
    )

    .split(/\n+/)

    .filter(p => p.trim() !== "")

    .map(p => `<p>${p.trim()}</p>`)

    .join("");
}

/* ================= LOAD POST ================= */
async function loadPost() {

  const id = getPostId();

  if (!id) {

    document.getElementById(
      "postContainer"
    ).innerHTML = "<p>Invalid post.</p>";

    return;
  }

  try {

    /* ================= PERFORMANCE FIX ================= */
    const res = await fetch(
  `https://mxm-backend.onrender.com/blog/post/${id}`
);

const post = await res.json();

    if (!post || !post.title) {

      document.getElementById(
        "postContainer"
      ).innerHTML = "<p>Post not found.</p>";

      return;
    }

    /* ================= SEO ================= */
    document.title = post.title;

    document.querySelector(
      'meta[name="description"]'
    ).setAttribute(
      "content",
      (post.content || "").substring(0, 150)
    );

    document.querySelector(
      'meta[property="og:title"]'
    ).setAttribute(
      "content",
      post.title
    );

    document.querySelector(
      'meta[property="og:description"]'
    ).setAttribute(
      "content",
      (post.content || "").substring(0, 150)
    );

    if (post.image) {

      document.querySelector(
        'meta[property="og:image"]'
      ).setAttribute(
        "content",
        post.image
      );
    }

    /* ================= RENDER ================= */
    document.getElementById(
      "postContainer"
    ).innerHTML = `

      <div class="title">
        ${post.title}
      </div>

      <div class="meta">
        MCN Engine • Published Post
      </div>

      ${
        post.image
        ? `
          <img
            class="image"
            src="${post.image}"
            loading="lazy"
            alt="${post.title}"
          >
        `
        : ""
      }

      <div class="content">

        ${formatContent(post.content)}

      </div>
    `;

    /* ================= VIEW COUNT ================= */
    fetch(`/blog/view/${id}`, {
      method: "POST"
    });

  } catch (err) {

    console.error(err);

    document.getElementById(
      "postContainer"
    ).innerHTML = `
      <p>
        Error loading post.
      </p>
    `;
  }
}

/* ================= INIT ================= */
loadPost();

</script>

</body>
</html>
