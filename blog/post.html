<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Blog Post</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <meta name="description" content="Latest crypto earning guides, referral programs and online income tips.">

  <!-- Open Graph -->
  <meta property="og:title" content="MCN Engine Blog">
  <meta property="og:description" content="Earn crypto, discover platforms and grow online income.">
  <meta property="og:type" content="article">
  <meta property="og:image" content="https://via.placeholder.com/600x300">
  <meta property="og:url" content="">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">

  <!-- Google indexing -->
  <meta name="robots" content="index, follow">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b132b;
      color: #fff;
    }

    .header {
      background: #1c2541;
      padding: 15px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 18px;
      color: #5bc0be;
    }

    .container {
      padding: 15px;
      max-width: 700px;
      margin: auto;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      color: #5bc0be;
      margin-bottom: 10px;
    }

    .image {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .content {
      font-size: 15px;
      line-height: 1.7;
      opacity: 0.95;
    }

    .content p {
      margin-bottom: 14px;
    }

    .back {
      position: fixed;
      bottom: 15px;
      right: 15px;
      background: #5bc0be;
      color: #000;
      border: none;
      padding: 10px 14px;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
    }

    .loading {
      text-align: center;
      padding: 40px;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>MCN ENGINE</h1>
</div>

<div class="container" id="postContainer">
  <div class="loading">Loading post...</div>
</div>

<button class="back" onclick="location.href='index.html'">← Back</button>

<script>

/* ================= GET POST ID ================= */
function getPostId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}

/* ================= AUTO FORMAT CONTENT (🔥 NEW) ================= */
function formatContent(text) {
  if (!text) return "";

  return text
    .split(/\n+/) // split by line breaks
    .filter(p => p.trim() !== "")
    .map(p => `<p>${p.trim()}</p>`)
    .join("");
}

/* ================= LOAD POST ================= */
async function loadPost() {
  const id = getPostId();

  if (!id) {
    document.getElementById("postContainer").innerHTML =
      "<p>Invalid post.</p>";
    return;
  }

  try {
    const res = await fetch("https://mxm-backend.onrender.com/blog/list");
    const data = await res.json();

    const post = data.find(p => p.id === id);

    if (!post) {
      document.getElementById("postContainer").innerHTML =
        "<p>Post not found.</p>";
      return;
    }

    // TITLE
    document.title = post.title;

    // SEO DESCRIPTION
    const desc = (post.content || "").substring(0, 150);

    document
      .querySelector('meta[name="description"]')
      .setAttribute("content", desc);

    // OPEN GRAPH
    document
      .querySelector('meta[property="og:title"]')
      .setAttribute("content", post.title);

    document
      .querySelector('meta[property="og:description"]')
      .setAttribute("content", desc);

    document
      .querySelector('meta[property="og:image"]')
      .setAttribute("content", post.image || "https://via.placeholder.com/600x300");

    document
      .querySelector('meta[property="og:url"]')
      .setAttribute("content", window.location.href);

    // STRUCTURED DATA (SEO BOOST)
    const structuredData = {
      "@context": "https://schema.org",
      "@type": "Article",
      "headline": post.title,
      "image": [post.image || "https://via.placeholder.com/600x300"],
      "datePublished": new Date().toISOString(),
      "author": {
        "@type": "Organization",
        "name": "MCN Engine"
      }
    };

    const script = document.createElement("script");
    script.type = "application/ld+json";
    script.innerHTML = JSON.stringify(structuredData);
    document.head.appendChild(script);

    // RENDER POST (🔥 FIXED)
    document.getElementById("postContainer").innerHTML = `
      <div class="title">${post.title}</div>

      ${post.image ? `<img class="image" src="${post.image}">` : ""}

      <div class="content">
        ${formatContent(post.content)}
      </div>
    `;

    // VIEW TRACKING
    fetch(`https://mxm-backend.onrender.com/blog/view/${post.id}`, {
      method: "POST"
    });

  } catch (err) {
    document.getElementById("postContainer").innerHTML =
      "<p>Error loading post.</p>";
  }
}

/* ================= INIT ================= */
loadPost();

</script>

</body>
</html>
