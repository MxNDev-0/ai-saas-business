<!DOCTYPE html>
<html>
<head>
  <title>MXM Blog - Crypto & Earnings</title>

  <meta name="description" content="MXM Blog - Learn crypto, online earning, CPA marketing and digital finance strategies.">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0b132b;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: #1c2541;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    h1 {
      color: #5bc0be;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .content {
      font-size: 14px;
      opacity: 0.9;
    }
  </style>
</head>

<body>

<h1>📚 MXM Blog</h1>

<div id="blogContainer">Loading blogs...</div>

<script>
async function loadBlogs() {
  try {
    const res = await fetch("https://mxm-backend.onrender.com/blog/list");
    const data = await res.json();

    const container = document.getElementById("blogContainer");
    container.innerHTML = "";

    data.forEach(post => {
      container.innerHTML += `
        <div class="card">
          <div class="title">${post.title}</div>
          <div class="content">${post.content}</div>
        </div>
      `;
    });

  } catch (err) {
    document.getElementById("blogContainer").innerHTML =
      "Failed to load blogs";
  }
}

loadBlogs();
</script>

</body>
</html>
