<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>MCN Post</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#071028;
  color:white;
}

.topbar{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  background:#111c44;
  position:sticky;
  top:0;
}

.icon-btn{
  width:40px;
  height:40px;
  border:none;
  border-radius:10px;
  background:#5bc0be;
  color:black;
  font-weight:bold;
}

.container{
  padding:15px;
}

.post{
  background:#16213e;
  padding:15px;
  border-radius:16px;
  margin-top:15px;
}

.username{
  font-weight:bold;
  margin-bottom:10px;
}

.text{
  font-size:15px;
  line-height:1.5;
  margin-bottom:15px;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button{
  border:none;
  padding:10px 12px;
  border-radius:12px;
  cursor:pointer;
}

.like{
  background:#5bc0be;
  color:black;
}

.comment{
  background:#1c2541;
  color:white;
}

.share{
  background:#2a3a6b;
  color:white;
}

.comments{
  margin-top:15px;
  font-size:14px;
  opacity:0.9;
}

.comment-box{
  background:#111b36;
  padding:10px;
  border-radius:12px;
  margin-top:8px;
}

.empty{
  opacity:0.6;
  text-align:center;
  margin-top:20px;
}

</style>

</head>

<body>

<div class="topbar">

  <button class="icon-btn" onclick="goBack()">←</button>

  <div>Post</div>

  <button class="icon-btn" onclick="sharePost()">🔁</button>

</div>

<div class="container">

  <div id="postContainer" class="post">
    Loading post...
  </div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ================= STATE ================= */

let currentUser = null;
let postOwnerUid = null;
let postId = null;

/* ================= AUTH ================= */

onAuthStateChanged(auth, async (user) => {

  if (!user) return location.href = "index.html";

  currentUser = user;

  const params = new URLSearchParams(location.search);

  postOwnerUid = params.get("uid");
  postId = params.get("postId");

  if (!postOwnerUid || !postId) {
    document.getElementById("postContainer").innerHTML =
      "<div class='empty'>Invalid post link</div>";
    return;
  }

  loadPost();

});

/* ================= LOAD POST ================= */

async function loadPost() {

  const ref = doc(db, "users", postOwnerUid, "posts", postId);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    document.getElementById("postContainer").innerHTML =
      "<div class='empty'>Post not found</div>";
    return;
  }

  const p = snap.data();

  document.getElementById("postContainer").innerHTML = `

    <div class="username">${p.username}</div>

    <div class="text">${p.text}</div>

    <div class="actions">

      <button class="like" onclick="likePost()">
        ❤️ ${p.likes?.length || 0}
      </button>

      <button class="comment" onclick="commentPost()">
        💬 ${p.comments?.length || 0}
      </button>

      <button class="share" onclick="sharePost()">
        🔁 Share
      </button>

    </div>

    <div class="comments">

      ${(p.comments || []).length === 0
        ? "<div class='empty'>No comments yet</div>"
        : p.comments.map(c => `
          <div class="comment-box">
            <b>${c.username}</b>: ${c.text}
          </div>
        `).join("")
      }

    </div>

  `;

}

/* ================= LIKE ================= */

window.likePost = async function () {

  const ref = doc(db, "users", postOwnerUid, "posts", postId);
  const snap = await getDoc(ref);

  const data = snap.data();
  let likes = data.likes || [];

  if (likes.includes(currentUser.uid)) {
    likes = likes.filter(x => x !== currentUser.uid);
  } else {
    likes.push(currentUser.uid);
  }

  await updateDoc(ref, { likes });

  loadPost();

};

/* ================= COMMENT ================= */

window.commentPost = async function () {

  const text = prompt("Write comment:");
  if (!text) return;

  const ref = doc(db, "users", postOwnerUid, "posts", postId);
  const snap = await getDoc(ref);

  const data = snap.data();
  const comments = data.comments || [];

  comments.push({
    uid: currentUser.uid,
    username: currentUser.email.split("@")[0],
    text,
    time: Date.now()
  });

  await updateDoc(ref, { comments });

  loadPost();

};

/* ================= SHARE FIX ================= */

window.sharePost = function () {

  const url = `${location.origin}/post.html?uid=${postOwnerUid}&postId=${postId}`;

  if (navigator.share) {
    navigator.share({
      title: "MCN Post",
      url
    });
  } else {
    navigator.clipboard.writeText(url);
    alert("Link copied");
  }

};

/* ================= NAV ================= */

window.goBack = function () {
  if (history.length > 1) history.back();
  else location.href = "profile.html";
};

</script>

</body>
</html>
