<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    .menu {
      z-index: 9999;
      width: 200px;
      background: #1c2541;
      border-radius: 12px;
      display: none;
      flex-direction: column;
    }

    .menu.active {
      display: flex;
    }

    .menu button {
      width: 100%;
      text-align: left;
      padding: 10px;
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
    }

    #chatBox {
      max-height: 250px;
      overflow-y: auto;
      background: #0b132b;
      padding: 10px;
      border-radius: 8px;
    }

    .row {
      display: flex;
      gap: 5px;
    }

    .row input {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: none;
      background: #1c2541;
      color: white;
    }

    .row button {
      background: #5bc0be;
      border: none;
      border-radius: 6px;
      padding: 8px;
    }

    .earn-card {
      text-align: center;
    }

    .earn-card button {
      display: inline-block;
    }

    .price-box {
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>

<body>

<div class="navbar">
  <button onclick="toggleMenu()">☰</button>
  <h3>MCN Engine</h3>
  <button onclick="logout()">Logout</button>
</div>

<div id="menu" class="menu">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="goProfile()">👤 Profile</button>
  <button onclick="goAdSpace()">🚀 Ads</button>
  <button onclick="goBlog()">📰 Blog</button>
  <button onclick="goFaq()">❓ FAQ</button>
  <button onclick="goAbout()">ℹ️ About</button>
  <button onclick="support()">💰 Support</button>
  <button onclick="openDeveloper()">💻 Dev</button>
  <button onclick="goAdmin()">🔐 Admin</button>
</div>

<div class="container">

  <div class="card">
    <h4>🟢 Live Users</h4>
    <div id="onlineUsers"></div>
  </div>

  <!-- ✅ REPLACED WALLET -->
  <div class="card">
    <h4>📊 Live Prices</h4>
    <div class="price-box" id="priceBox">Loading prices...</div>
  </div>

  <!-- CHAT -->
  <div class="card">
    <h4>💬 Community Chat</h4>

    <div id="chatBox"></div>
    <div id="typingBox"></div>

    <div class="row">
      <input id="chatInput">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <div class="card earn-card">
    <h4>💰 Earn</h4>
    <button onclick="location.href='earn/index.html'">Open</button>
  </div>

</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
