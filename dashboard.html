<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1c2541;
      padding: 10px;
    }

    .nav-left button {
      width: 35px;
      height: 35px;
      font-size: 16px;
      border-radius: 6px;
    }

    .nav-title {
      font-size: 18px;
    }

    /* MENU */
    .menu {
      display: none;
      flex-direction: column;
      position: absolute;
      top: 50px;
      left: 10px;
      width: 200px;
      background: #1c2541;
      border-radius: 10px;
      z-index: 9999;
    }

    .menu.active {
      display: flex;
    }

    .menu button {
      padding: 10px;
      text-align: left;
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
    }

    /* CONTAINER */
    .container {
      padding: 10px;
    }

    .card {
      background: #1c2541;
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    /* ================= ADS (FIXED CENTERED) ================= */
    .ads-container {
      overflow: hidden;
      position: relative;
      padding: 10px 0;
    }

    .ads-slider {
      display: flex;
      align-items: center;
      transition: transform 0.6s ease;
    }

    .ad {
      min-width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .ad-box {
      width: 80%;
      max-width: 300px;
      text-align: center;
      padding: 12px;
      background: #0b132b;
      border-radius: 10px;
      font-size: 13px;
      margin: auto;
    }

    /* DISCOVER */
    #discoverBox .card {
      cursor: pointer;
    }

    #discoverBox img {
      width: 100%;
      border-radius: 8px;
    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">
    <button onclick="toggleMenu()">☰</button>
  </div>

  <div class="nav-title">MCN Engine</div>
</div>

<!-- MENU -->
<div id="menu" class="menu">

  <button onclick="goHome()">🏠 Home</button>
  <button onclick="goProfile()">👤 Profile</button>
  <button onclick="goMessages()">💬 Messages</button>
  <button onclick="goAdSpace()">🚀 Ads</button>
  <button onclick="goBlog()">📰 Blog</button>
  <button onclick="goFaq()">❓ FAQ</button>
  <button onclick="goAbout()">ℹ️ About</button>

  <!-- NEW -->
  <button onclick="toggleNotif()">🔔 Notifications</button>
  <button onclick="donate()">💰 Donate</button>

  <button onclick="goAdmin()">🔐 Admin</button>
  <button onclick="logout()">🚪 Logout</button>

</div>

<!-- NOTIFICATION PANEL -->
<div id="notifPanel" class="menu" style="right:10px;left:auto;top:50px;"></div>

<!-- MAIN -->
<div class="container">

  <!-- ADS -->
  <div class="card">
    <h4>🔥 Sponsored Ads</h4>

    <div class="ads-container">
      <div class="ads-slider" id="adsSlider">

        <div class="ad">
          <div class="ad-box">🚀 Promote your project here</div>
        </div>

        <div class="ad">
          <div class="ad-box">💰 Buy ad space on MCN Engine</div>
        </div>

        <div class="ad">
          <div class="ad-box">📢 Your ad here</div>
        </div>

      </div>
    </div>
  </div>

  <!-- PRICES -->
  <div class="card">
    <h4>📊 Live Prices</h4>
    <div id="priceBox">Loading...</div>
  </div>

  <!-- DISCOVER -->
  <div class="card">
    <h4>📰 Discover Feed</h4>
    <div id="discoverBox">Loading feed...</div>
  </div>

</div>

<script type="module" src="dashboard.js"></script>

<!-- DISCOVER SCRIPT -->
<script>
async function loadDiscover() {
  const box = document.getElementById("discoverBox");

  try {
    const res = await fetch("https://mxm-backend.onrender.com/blog/list");
    const data = await res.json();

    box.innerHTML = "";

    data.forEach(post => {
      box.innerHTML += `
        <div class="card" onclick="openPost('${post.id}')">

          ${post.image ? `<img src="${post.image}">` : ""}

          <div>
            <b style="color:#5bc0be">${post.title}</b>
            <p style="font-size:12px;opacity:0.8;">
              ${(post.content || "").substring(0,120)}...
            </p>
          </div>

        </div>
      `;
    });

  } catch (e) {
    box.innerHTML = "Failed to load feed";
  }
}

function openPost(id) {
  location.href = "post.html?id=" + id;
}

loadDiscover();
</script>

</body>
</html>
