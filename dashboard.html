<!DOCTYPE html>
<html>
<head>
  <title>MXM Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>MXM Crypto Empire <span class="beta">BETA</span></h1>
</div>

<h2>Dashboard</h2>

<button onclick="logout()">Logout</button>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;">
  <h3>Admin Panel 👑</h3>
  <p>You are the admin</p>
</div>

<!-- POST BOX -->
<div class="post-box">
  <textarea id="postText" placeholder="Write something..."></textarea>
  <input type="text" id="postLink" placeholder="Paste your link">
  <button onclick="createPost()">Post</button>
</div>

<h3>Feed</h3>
<div id="posts"></div>

<script type="module" src="dashboard.js"></script>
</body>
</html>
