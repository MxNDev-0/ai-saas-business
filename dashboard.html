<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b132b;
      color: white;
      overflow-x: hidden;
    }

    .container {
      padding: 10px;
      max-width: 100%;
    }

    /* ================= NAVBAR ================= */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #1c2541;
      position: sticky;
      top: 0;
      z-index: 9999;
    }

    .nav-left, .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      margin: 0;
      color: white;
      white-space: nowrap;
    }

    /* ================= NOTIFICATIONS ================= */
    .notif-wrapper {
      position: relative;
      cursor: pointer;
      font-size: 16px;
      padding: 5px;
    }

    .notif-badge {
      position: absolute;
      top: -5px;
      right: -8px;
      background: red;
      color: white;
      border-radius: 50%;
      padding: 2px 6px;
      font-size: 10px;
      display: none;
    }

    .notif-panel {
      position: absolute;
      top: 50px;
      right: 10px;
      width: 280px;
      max-height: 350px;
      overflow-y: auto;
      background: #1c2541;
      border-radius: 12px;
      display: none;
      z-index: 9999;
    }

    /* ================= CARDS ================= */
    .card {
      background: #1c2541;
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
      padding: 10px;
    }

    /* ================= DISCOVER ================= */
    #discoverBox {
      margin-top: 10px;
    }

    .discover-card {
      background: #0b132b;
      margin-bottom: 10px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
    }

    .discover-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .discover-content {
      padding: 10px;
    }

    .discover-title {
      color: #5bc0be;
      font-weight: bold;
    }

    .discover-text {
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="navbar">

  <div class="nav-left">
    <button onclick="toggleMenu()">☰</button>
  </div>

  <h3 class="nav-title">MCN Engine</h3>

  <div class="nav-right">
    <div class="notif-wrapper" onclick="toggleNotif()">
      🔔
      <span id="notifCount" class="notif-badge"></span>
    </div>

    <button onclick="logout()">Logout</button>
  </div>

</div>

<div id="notifPanel" class="notif-panel"></div>

<div class="container">

  <div class="card">
    <h4>🔥 Sponsored Ads</h4>
  </div>

  <div class="card">
    <h4>📊 Live Prices</h4>
    <div id="priceBox">Loading...</div>
  </div>

  <div class="card">
    <h4>📰 Discover Feed</h4>
    <div id="discoverBox">Loading...</div>
  </div>

</div>

<script type="module" src="dashboard.js"></script>

<script>
/* ================= DISCOVER ================= */
async function loadDiscover() {
  const box = document.getElementById("discoverBox");

  try {
    const res = await fetch("https://mxm-backend.onrender.com/blog/list");
    const data = await res.json();

    box.innerHTML = "";

    data.forEach(post => {
      box.innerHTML += `
        <div class="discover-card" onclick="openPost('${post.id}')">

          ${post.image ? `<img src="${post.image}">` : ""}

          <div class="discover-content">
            <div class="discover-title">${post.title}</div>
            <div class="discover-text">
              ${(post.content || "").substring(0, 120)}...
            </div>
          </div>

        </div>
      `;
    });

  } catch (e) {
    box.innerHTML = "Failed to load feed";
  }
}

/* FIXED ROUTING */
function openPost(id) {
  location.href = "blog/post.html?id=" + id;
}

/* NOTIFICATION TOGGLE */
window.toggleNotif = function () {
  const panel = document.getElementById("notifPanel");
  if (!panel) return;
  panel.style.display = panel.style.display === "block" ? "none" : "block";
};

loadDiscover();
</script>

</body>
</html>
