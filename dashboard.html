<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1c2541;
      padding: 10px;
      position: relative;
    }

    .nav-left button {
      width: 35px;
      height: 35px;
      font-size: 16px;
      border-radius: 6px;
    }

    .nav-title {
      font-size: 18px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .menu {
      display: none;
      flex-direction: column;
      position: absolute;
      top: 50px;
      left: 10px;
      width: 220px;
      background: #1c2541;
      border-radius: 10px;
      z-index: 9999;
    }

    .menu.active {
      display: flex;
    }

    .menu button {
      padding: 10px;
      text-align: left;
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
    }

    .container {
      padding: 10px;
    }

    .card {
      background: #1c2541;
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    .ads-container {
      overflow: hidden;
      position: relative;
      padding: 10px 0;
    }

    .ads-slider {
      display: flex;
      transition: transform 0.6s ease;
      align-items: center;
    }

    .ad {
      min-width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .ad-box {
      width: 80%;
      max-width: 320px;
      text-align: center;
      padding: 14px;
      background: linear-gradient(135deg, #5bc0be, #3a86ff);
      color: #000;
      border-radius: 12px;
      font-size: 13px;
      font-weight: bold;
      margin: auto;
    }

    #discoverBox .card {
      cursor: pointer;
    }

    #discoverBox img {
      width: 100%;
      border-radius: 8px;
    }

    .read-more {
      margin-top: 8px;
      font-size: 12px;
      color: #5bc0be;
      cursor: pointer;
    }

    .lang-select {
      background: #5bc0be;
      border: none;
      padding: 6px;
      border-radius: 6px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

  <div class="nav-left">
    <button onclick="toggleMenu()">☰</button>
  </div>

  <div class="nav-title" data-i18n="title">MCN Engine</div>

  <div class="nav-right">

    <select class="lang-select" onchange="setLang(this.value)">
      <option value="en">EN</option>
      <option value="fr">FR</option>
      <option value="es">ES</option>
      <option value="ig">IG</option>
    </select>

  </div>
</div>

<!-- MENU -->
<div id="menu" class="menu">
  <button data-i18n="home" onclick="goHome()">🏠 Home</button>
  <button data-i18n="profile" onclick="goProfile()">👤 Profile</button>
  <button data-i18n="messages" onclick="goMessages()">💬 Messages</button>
  <button data-i18n="ads" onclick="goAdSpace()">🚀 Ads</button>
  <button data-i18n="blog" onclick="goBlog()">📰 Blog</button>
  <button data-i18n="faq" onclick="goFaq()">❓ FAQ</button>
  <button data-i18n="about" onclick="goAbout()">ℹ️ About</button>
  <button data-i18n="donate" onclick="donate()">💰 Donate</button>
  <button data-i18n="admin" onclick="goAdmin()">🔐 Admin</button>
  <button data-i18n="logout" onclick="logout()">🚪 Logout</button>
</div>

<div class="container">

  <!-- ADS -->
  <div class="card">
    <h4 data-i18n="ads_title">🔥 Sponsored Ads</h4>

    <div class="ads-container">
      <div class="ads-slider" id="adsSlider">

        <div class="ad">
          <div class="ad-box" data-i18n="ad1">🚀 Promote your project here</div>
        </div>

        <div class="ad">
          <div class="ad-box" data-i18n="ad2">💰 Buy ad space on MCN Engine</div>
        </div>

        <div class="ad">
          <div class="ad-box" data-i18n="ad3">📢 Your ad here</div>
        </div>

      </div>
    </div>
  </div>

  <!-- PRICES -->
  <div class="card">
    <h4 data-i18n="prices">📊 Live Prices</h4>
    <div id="priceBox">Loading...</div>
  </div>

  <!-- DISCOVER -->
  <div class="card">
    <h4 data-i18n="discover">📰 Discover Feed</h4>
    <div id="discoverBox">Loading feed...</div>
  </div>

</div>

<script type="module" src="dashboard.js"></script>

<script>
/* ================= LANGUAGE SYSTEM ================= */

const translations = {
  en: {

    home: "Home",
    profile: "Profile",
    messages: "Messages",
    ads: "Ads",
    blog: "Blog",
    faq: "FAQ",
    about: "About",
    donate: "Donate",
    admin: "Admin",
    logout: "Logout",
    ads_title: "🔥 Sponsored Ads",
    ad1: "🚀 Promote your project here",
    ad2: "💰 Buy ad space on MCN Engine",
    ad3: "📢 Your ad here",
    prices: "📊 Live Prices",
    discover: "📰 Discover Feed"
  },

  fr: {
    title: "Moteur MCN",
    home: "Accueil",
    profile: "Profil",
    messages: "Messages",
    ads: "Publicité",
    blog: "Blog",
    faq: "FAQ",
    about: "À propos",
    donate: "Don",
    admin: "Admin",
    logout: "Déconnexion",
    ads_title: "🔥 Publicités sponsorisées",
    ad1: "🚀 Faites la promotion ici",
    ad2: "💰 Achetez un espace pub",
    ad3: "📢 Votre pub ici",
    prices: "📊 Prix en direct",
    discover: "📰 Découverte"
  },

  es: {
    title: "Motor MCN",
    home: "Inicio",
    profile: "Perfil",
    messages: "Mensajes",
    ads: "Anuncios",
    blog: "Blog",
    faq: "FAQ",
    about: "Acerca de",
    donate: "Donar",
    admin: "Admin",
    logout: "Salir",
    ads_title: "🔥 Anuncios patrocinados",
    ad1: "🚀 Promociona aquí",
    ad2: "💰 Compra espacio publicitario",
    ad3: "📢 Tu anuncio aquí",
    prices: "📊 Precios en vivo",
    discover: "📰 Descubrir"
  },

  ig: {
    title: "MCN Engine",
    home: "Ụlọ",
    profile: "Profaịlụ",
    messages: "Ozi",
    ads: "Mgbasa ozi",
    blog: "Blog",
    faq: "Ajụjụ",

    ad1: "🚀 Tinye mgbasa ozi gị",
    ad2: "💰 Zụta oghere",
    ad3: "📢 Mgbasa ozi gị",
    prices: "📊 Ọnụ ahịa ndụ",
    discover: "📰 Chọpụta"
  }
};

function applyLang(lang){
  localStorage.setItem("lang", lang);

  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key = el.getAttribute("data-i18n");
    if(translations[lang]?.[key]){
      el.innerText = translations[lang][key];
    }
  });
}

function setLang(lang){
  applyLang(lang);
}

/* apply saved language */
window.addEventListener("load", ()=>{
  const saved = localStorage.getItem("lang") || "en";
  applyLang(saved);
});
</script>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}
</script>

<script>
/* ================= BLOG FIX ================= */

function applyBlogLang(){
  const lang = localStorage.getItem("lang") || "en";

  document.querySelectorAll("#discoverBox .card").forEach(card=>{
    if(!card.querySelector(".read-more")){
      const div = document.createElement("div");
      div.className = "read-more";
      div.innerText = "Read more";
      card.appendChild(div);
    }
  });
}

async function loadDiscover(){
  const box = document.getElementById("discoverBox");

  try {
    const res = await fetch("https://mxm-backend.onrender.com/blog/list");

    if(!res.ok) throw new Error();

    const data = await res.json();

    box.innerHTML = "";

    data.forEach(post=>{
      box.innerHTML += `
        <div class="card" onclick="openPost('${post.id}')">
          ${post.image ? `<img src="${post.image}">` : ""}
          <div>
            <b>${post.title}</b>
            <p>${(post.content || "").substring(0,120)}...</p>
          </div>
        </div>
      `;
    });

    applyBlogLang();
    return true;

  } catch(e){
    box.innerHTML = "⚠️ Discover unavailable";
    return false;
  }
}

function openPost(id){
  window.location.href = "blog/post.html?id=" + id;
}

loadDiscover();
</script>

</body>
</html>
