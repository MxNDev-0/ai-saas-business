<!DOCTYPE html>
<html>
<head>
  <title>MXM Crypto Empire</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2 class="logo">MXM Crypto Empire <span class="beta">BETA</span></h2>

  <div class="nav-links">
    <button onclick="goHome()">Home</button>
    <button onclick="goProfile()">Profile</button>
    <button onclick="goAdmin()">Admin</button>
    <button onclick="goPremium()">Unlock Premium 💎</button>
    <button onclick="location.href='chat.html'">Live Chat 💬</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

  <!-- ANALYTICS -->
  <div class="analytics">
    <h3>📊 Analytics</h3>
    <p>Total Posts: <span id="totalPosts">0</span></p>
    <p>Total Clicks: <span id="totalClicks">0</span></p>
    <p>Total Likes: <span id="totalLikes">0</span></p>
    <p>Top Post: <span id="topPost">None</span></p>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" style="display:none;">
    <h3>👑 Admin Dashboard</h3>

    <button onclick="sendNotification()">Send Notification 🔔</button>

    <div id="usersList"></div>
  </div>

  <!-- POST BOX -->
  <div class="post-box">
    <textarea id="postText" placeholder="What's on your mind?"></textarea>
    <input type="text" id="postLink" placeholder="Paste your link">
    <button onclick="createPost()">Post</button>
  </div>

  <!-- POSTS -->
  <div id="posts"></div>

</div>

<script type="module" src="dashboard.js"></script>
</body>
                                         </html>
