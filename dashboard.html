<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1c2541;
      padding: 10px;
      position: relative;
    }

    .nav-left button {
      width: 35px;
      height: 35px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    .nav-title {
      font-size: 18px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .menu {
      display: none;
      flex-direction: column;
      position: absolute;
      top: 50px;
      left: 10px;
      width: 210px;
      background: #1c2541;
      border-radius: 10px;
      z-index: 9999;
      overflow: hidden;
    }

    .menu.active { display: flex; }

    .menu button {
      padding: 12px;
      text-align: left;
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .menu button:hover {
      background: #111a33;
    }

    .container {
      padding: 10px;
    }

    .card {
      background: #1c2541;
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    .news-item {
      padding: 10px;
      margin-bottom: 8px;
      background: #0b132b;
      border-radius: 8px;
      cursor: pointer;
    }

    .news-title {
      font-weight: bold;
      color: #5bc0be;
    }

    .news-date {
      font-size: 11px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="nav-left">
    <button onclick="toggleMenu()">☰</button>
  </div>

  <div class="nav-title">MCN Engine</div>
</div>

<div id="menu" class="menu">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="goAdSpace()">🚀 Ads</button>
  <button onclick="goBlog()">📰 Blog</button>
  <button onclick="goFaq()">❓ FAQ</button>
  <button onclick="goAbout()">ℹ️ About</button>
  <button onclick="goContact()">📩 Contact</button>
  <button onclick="logout()">🚪 Logout</button>
</div>

<div class="container">

  <!-- 📰 NEWS (REPLACED LIVE PRICES) -->
  <div class="card">
    <h4>📰 Live US News Feed</h4>
    <div id="newsBox">Loading news...</div>
  </div>

  <div class="card">
    <h4>⭐ Featured Posts</h4>
    <div id="featuredBox">Loading...</div>
  </div>

  <div class="card">
    <h4>🔥 Trending Posts</h4>
    <div id="trendingBox">Loading...</div>
  </div>

  <div class="card">
    <h4>📰 Discover Feed</h4>
    <div id="discoverBox">Loading...</div>
  </div>

</div>

<script type="module" src="dashboard.js"></script>

<script>
window.toggleMenu = function () {
  document.getElementById("menu").classList.toggle("active");
};

window.logout = function () {
  location.href = "index.html";
};

window.goHome = () => location.href = "dashboard.html";
window.goAdSpace = () => location.href = "ads.html";
window.goBlog = () => location.href = "blog/index.html";
window.goFaq = () => location.href = "faq.html";
window.goAbout = () => location.href = "about.html";
window.goContact = () => location.href = "contact.html";
</script>

</body>
</html>
