<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <!-- 🔥 FIX: ensures menu always appears above everything -->
  <style>
    .menu {
      z-index: 9999;
    }

    #chatBox {
      scroll-behavior: smooth;
    }
  </style>
</head>

<body>

<div class="navbar">
  <button onclick="toggleMenu()">☰</button>
  <h3>MCN Engine</h3>
  <button onclick="logout()">Logout</button>
</div>

<div id="menu" class="menu">
  <button onclick="goHome()">Home</button>
  <button onclick="goProfile()">Profile</button>
  <button onclick="goAdmin()">Admin</button>
  <button onclick="goPremium()">Upgrade 🚀</button>
  <button onclick="support()">Support 💰</button>

  <!-- NAV FIXED LINKS -->
  <button onclick="goFaq()">FAQ</button>
  <button onclick="goAbout()">About</button>
  <button onclick="goBlog()">Blog</button>

  <!-- 🔥 PREMIUM SYSTEM READY HOOK (SAFE PLACE FOR NEXT UPGRADE) -->
  <button class="premium-only" onclick="openDeveloper()">Developer 💻</button>
</div>

<div class="container">

  <div class="card">
    <h4>🟢 Live Users</h4>
    <div id="onlineUsers"></div>
  </div>

  <div class="card">
    <h4>💰 Wallet</h4>
    <p>$<span id="walletBalance">0</span></p>
    <p id="walletUpdated">-</p>
  </div>

  <div class="card">
    <h4>💬 Community Feed</h4>

    <div id="chatBox"></div>

    <div class="row">
      <input id="chatInput" placeholder="Write something...">
      <button onclick="sendMessage()">Post</button>
    </div>
  </div>

  <!-- 🔥 ADS SYSTEM READY (ENGINE v15 HOOK) -->
  <div class="card ads-only">
    <h4>📢 Sponsored</h4>
    <p>Advertise your business here</p>
  </div>

  <div class="card earn-card">
    <h4>💰 Earn</h4>
    <button onclick="location.href='earn/index.html'">Open Earn</button>
  </div>

</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
