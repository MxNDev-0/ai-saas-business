<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    .menu {
      z-index: 9999;
    }

    #chatBox {
      scroll-behavior: smooth;
      max-height: 250px;
      overflow-y: auto;
      padding: 10px;
      background: #0b132b;
      border-radius: 8px;
    }

    .msg {
      margin-bottom: 8px;
      padding: 6px;
      background: #1c2541;
      border-radius: 6px;
      font-size: 13px;
    }

    .msg small {
      opacity: 0.6;
      display: block;
      margin-top: 2px;
      font-size: 10px;
    }

    .row {
      display: flex;
      gap: 5px;
      margin-top: 8px;
    }

    .row input {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: none;
      background: #1c2541;
      color: white;
    }

    .row button {
      padding: 8px 12px;
      background: #5bc0be;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="navbar">
  <button onclick="toggleMenu()">☰</button>
  <h3>MCN Engine</h3>
  <button onclick="logout()">Logout</button>
</div>

<!-- MENU -->
<div id="menu" class="menu">
  <button onclick="goHome()">Home</button>
  <button onclick="goProfile()">Profile</button>
  <button onclick="goAdmin()">Admin</button>
  <button onclick="goAdSpace()">Buy Ad Space 🚀</button>
  <button onclick="support()">Support 💰</button>
  <button onclick="goFaq()">FAQ</button>
  <button onclick="goAbout()">About</button>
  <button onclick="goBlog()">Blog</button>
  <button onclick="openDeveloper()">Developer 💻</button>
</div>

<div class="container">

  <div class="card">
    <h4>🟢 Live Users</h4>
    <div id="onlineUsers"></div>
  </div>

  <div class="card">
    <h4>💰 Wallet</h4>
    <p>$<span id="walletBalance">0</span></p>
    <p id="walletUpdated">-</p>
  </div>

  <!-- ================= CHAT SYSTEM ================= -->
  <div class="card">
    <h4>💬 Community Chat</h4>

    <div id="chatBox"></div>

    <div class="row">
      <input id="chatInput" placeholder="Write something...">
      <button onclick="sendMessage()">Post</button>
    </div>
  </div>

  <div class="card ads-only">
    <h4>📢 Sponsored Space</h4>
    <p>Buy this space to promote your business</p>
  </div>

  <div class="card earn-card">
    <h4>💰 Earn</h4>
    <button onclick="location.href='earn/index.html'">Open Earn</button>
  </div>

</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
