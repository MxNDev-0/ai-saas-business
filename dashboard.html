<!DOCTYPE html>
<html>
<head>
  <title>MXM Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <button onclick="toggleMenu()">☰</button>
  <h3 style="margin:0 auto;">MXM Dashboard</h3>
  <button onclick="logout()">Logout</button>
</div>

<!-- MENU -->
<div id="menu" class="menu">
  <button onclick="goHome()">Home</button>
  <button onclick="goProfile()">Profile</button>
  <button onclick="goAdmin()">Admin</button>
  <button onclick="upgrade()">Upgrade 🚀</button>
  <button onclick="support()">Support 💰</button>
  <button onclick="location.href='faq.html'">FAQ</button>
  <button onclick="location.href='about.html'">About</button>
</div>

<div class="container">

  <!-- USERS -->
  <div class="card">
    <h4>🟢 Users</h4>
    <div id="onlineUsers"></div>
  </div>

  <!-- MERGED CHAT + POSTS -->
  <div class="card">
    <h4>💬 Community Feed</h4>

    <div id="chatBox" style="
      height:220px;
      overflow-y:auto;
      background:#0b132b;
      padding:10px;
      border-radius:8px;
    "></div>

    <div class="row">
      <input id="chatInput" placeholder="Write something..." style="max-width:70%;">
      <button style="width:auto;padding:6px 10px;" onclick="sendMessage()">Post</button>
    </div>
  </div>

</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
