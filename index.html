<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MXM Crypto Empire</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b132b;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#1c2541;
}

.menu{
  font-size:24px;
  cursor:pointer;
}

.beta{
  background:gold;
  color:black;
  padding:3px 8px;
  border-radius:6px;
}

/* HERO */
.hero{
  text-align:center;
  padding:30px;
}

.logo{
  width:80px;
  height:80px;
  margin:auto;
  background:gold;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:black;
  font-weight:bold;
  font-size:18px;
}

.hero h1{
  background:linear-gradient(to right,red,orange,yellow,green,blue,violet);
  -webkit-background-clip:text;
  color:transparent;
}

/* MENU PANEL */
#menuPanel{
  display:none;
  position:fixed;
  top:0;
  right:0;
  width:220px;
  height:100%;
  background:#1c2541;
  padding:20px;
  z-index:1000;
}

#menuPanel button{
  width:100%;
  margin:10px 0;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  z-index:2000;
}

.modal-box{
  background:#1c2541;
  padding:20px;
  max-width:320px;
  margin:100px auto;
  border-radius:10px;
  text-align:center;
}

input, textarea{
  width:90%;
  padding:10px;
  margin:6px;
  border-radius:6px;
  border:none;
}

/* DASHBOARD */
#dashboard{
  display:none;
  padding:15px;
}

.section{
  display:none;
}

.active{
  display:block;
}

/* BUTTON */
button{
  background:gold;
  color:black;
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.logout{
  background:red;
  color:white;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="menu" onclick="toggleMenu()">☰</div>
  <div class="beta">BETA</div>
</div>

<!-- HERO -->
<div class="hero" id="landing">
  <div class="logo">MXM</div>
  <h1>MXM Crypto Empire</h1>
  <p>Discover legit platforms to earn online</p>
</div>

<!-- MENU -->
<div id="menuPanel"></div>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
  <div class="modal-box">
    <h3>Login</h3>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPass" type="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <button onclick="resetPassword()">Forgot Password</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<!-- SIGNUP MODAL -->
<div class="modal" id="signupModal">
  <div class="modal-box">
    <h3>Register</h3>
    <input id="signupEmail" placeholder="Email">
    <input id="signupPass" type="password" placeholder="Password">
    <button id="signupBtn">Create Account</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <button onclick="showSection('home')">Home</button>
  <button onclick="showSection('about')">About</button>
  <button onclick="showSection('faq')">FAQ</button>
  <button onclick="showSection('support')">Support</button>
  <button onclick="showSection('settings')">Settings</button>

  <div id="home" class="section active">
    <h3>Platforms</h3>
    <button onclick="window.open('https://forfans.me/chichiguy','_blank')">Free Earning</button>
    <button onclick="window.open('https://ff.io/?ref=s1nep47a','_blank')">FixedFloat</button>
  </div>

  <div id="about" class="section">
    <p>This platform shares legit platforms. Not financial advice.</p>
  </div>

  <div id="faq" class="section">
    <p>Basic FAQ here...</p>
  </div>

  <div id="support" class="section">
    <textarea id="supportMsg"></textarea><br>
    <button onclick="sendMessage()">Send</button>
  </div>

  <div id="settings" class="section">
    <input placeholder="Username">
  </div>

  <button class="logout" onclick="logout()">Logout</button>

</div>

<script type="module" src="app.js"></script>

<script>
function toggleMenu(){
  let menu=document.getElementById("menuPanel");

  if(window.isLoggedIn){
    menu.innerHTML = `
      <button onclick="showSection('home')">Home</button>
      <button onclick="showSection('about')">About</button>
      <button onclick="showSection('faq')">FAQ</button>
      <button onclick="showSection('support')">Support</button>
      <button onclick="logout()">Logout</button>
    `;
  } else {
    menu.innerHTML = `
      <button onclick="openLogin()">Login</button>
      <button onclick="openSignup()">Sign Up</button>
    `;
  }

  menu.style.display = menu.style.display==="block"?"none":"block";
}

function openLogin(){
  document.getElementById("loginModal").style.display="block";
}

function openSignup(){
  document.getElementById("signupModal").style.display="block";
}

function closeModal(){
  document.querySelectorAll(".modal").forEach(m=>m.style.display="none");
}

function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function sendMessage(){
  let box=document.getElementById("supportMsg");
  alert("Message sent");
  box.value="";
}
</script>

</body>
  </html>
