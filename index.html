<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine V15 — Monetization Control Network</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Discover websites, apps, and online opportunities with MCN Engine. Learn, explore, and grow online in one place.">

  <meta property="og:title" content="MCN Engine — Discover. Learn. Explore.">
  <meta property="og:description" content="Find websites, tools, and online opportunities easily.">
  <meta property="og:type" content="website">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5bc0be">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>
    /* (UNCHANGED STYLES — same as yours) */
    body {
      background: #0b132b;
      color: #fff;
      font-family: Arial;
      margin: 0;
      overflow-x: hidden;
    }
  </style>
</head>

<body>

<div id="splashScreen">
  <img src="assets/logo.png">
</div>

<div class="header">
  <div class="left">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="logo">
      <img src="assets/logo.png">
      <span>MCN Engine</span>
    </div>
  </div>

  <div class="profile-btn" onclick="openLogin()">👤</div>
</div>

<div id="menu">
  <div onclick="goHome()">Home</div>
  <div onclick="goTrending()">Trending</div>
  <div onclick="goDashboard()">Dashboard</div>
  <div onclick="contact()">Contact</div>
</div>

<div class="featured" id="featuredPost"></div>

<div class="feed" id="feed">Loading posts...</div>

<div class="login-modal" id="loginModal">
  <div class="center-box">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Create Account</button>
    <button onclick="login()">Login</button>
    <button onclick="closeLogin()">Close</button>
  </div>
</div>

<script type="module">

window.toggleMenu = () => {
  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
};

window.openLogin = () => {
  document.getElementById("loginModal").style.display = "flex";
};

window.closeLogin = () => {
  document.getElementById("loginModal").style.display = "none";
};

window.openPost = (id) => {
  window.location.href = "./blog/post.html?id=" + id;
};

window.goHome = () => location.href = "./index.html";
window.goTrending = () => location.href = "./trending.html";
window.goDashboard = () => location.href = "./dashboard.html";
window.contact = () => location.href = "./contact.html";

/* ================= FEED ================= */

async function loadFeed() {

  const feed = document.getElementById("feed");
  const featuredBox = document.getElementById("featuredPost");

  try {

    const res = await fetch(
      "https://mxm-backend.onrender.com/blog/latest?limit=6"
    );

    if (!res.ok) throw new Error("Server error " + res.status);

    const posts = await res.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      feed.innerHTML = "<p>No posts available yet</p>";
      return;
    }

    feed.innerHTML = "";

    const sorted = posts.sort(
      (a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0)
    );

    const featured = sorted[0];

    if (featuredBox && featured) {
      featuredBox.innerHTML = `
        <div class="post" onclick="openPost('${featured.id}')"
          style="border:2px solid #5bc0be;">
          <h3>🔥 Featured</h3>
          <h4>${featured.title}</h4>
          <p>${(featured.content || "").slice(0,120)}...</p>
        </div>
      `;
    }

    sorted.forEach(p => {
      feed.innerHTML += `
        <div class="post" onclick="openPost('${p.id}')">
          <h4>${p.title}</h4>
          <p>${(p.content || "").slice(0,90)}...</p>
        </div>
      `;
    });

  } catch (err) {

    console.error("Feed error:", err);

    feed.innerHTML = `
      <div class="post">
        <h4>⚠ Feed temporarily unavailable</h4>
        <p>Backend not responding.</p>
        <button onclick="loadFeed()">Retry</button>
      </div>
    `;
  }
}

loadFeed();

</script>

<script src="./mcn-loader.js"></script>

</body>
</html>
