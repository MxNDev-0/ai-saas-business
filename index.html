<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine V15 — Monetization Control Network</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description"
        content="Discover websites, apps, and online opportunities with MCN Engine.">

  <meta property="og:title"
        content="MCN Engine — Discover. Learn. Explore.">

  <meta property="og:description"
        content="Find websites, tools, and online opportunities easily.">

  <meta property="og:type"
        content="website">

  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#5bc0be">

  <style>

    body {
      background: #0b132b;
      color: #fff;
      font-family: Arial;
      margin: 0;
    }

    /* ================= SPLASH FIXED ================= */

    #splashScreen {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #0b132b;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    #splashScreen img {
      width: 90px;
    }

    /* ================= HEADER ================= */

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: #1c2541;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .menu-btn {
      font-size: 22px;
      cursor: pointer;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: bold;
      color: #5bc0be;
    }

    .logo img {
      height: 28px;
    }

    .profile-btn {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: #5bc0be;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #000;
      font-weight: bold;
    }

    /* ================= MENU ================= */

    #menu {
      display: none;
      background: #1c2541;
      padding: 10px;
    }

    #menu div {
      padding: 10px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }

    /* ================= FEED ================= */

    .featured {
      padding: 15px;
    }

    .feed {
      padding: 15px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .post {
      background: linear-gradient(145deg, #1c2541, #141b2e);
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.25s;
    }

    .post:hover {
      transform: translateY(-4px);
      border: 1px solid #5bc0be;
    }

    /* ================= LOGIN ================= */

    .login-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .center-box {
      background: #1c2541;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 350px;
      box-sizing: border-box;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      background: #0b132b;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      background: #5bc0be;
      color: #000;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .secondary-btn {
      background: transparent;
      border: 1px solid #5bc0be;
      color: #5bc0be;
    }

    /* ================= COOKIES ================= */

    .cookie-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #1c2541;
      padding: 12px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      z-index: 9999;
      border-top: 1px solid #333;
      box-sizing: border-box;
    }

    .cookie-banner span {
      font-size: 13px;
      color: #ddd;
      line-height: 1.4;
    }

    .cookie-banner button {
      width: auto !important;
      padding: 8px 14px !important;
      margin: 0 !important;
      border-radius: 8px;
      font-size: 13px;
      flex-shrink: 0;
    }

    /* ================= FOOTER ================= */

    .footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: #aaa;
      margin-top: 40px;
    }

    .footer a {
      color: #5bc0be;
      text-decoration: none;
    }

    .footer-logo {
      height: 16px;
      vertical-align: middle;
      margin-right: 6px;
    }

  </style>
</head>

<body>

<!-- ================= SPLASH ================= -->

<div id="splashScreen">
  <img src="assets/logo.png">
</div>

<!-- ================= HEADER ================= -->

<div class="header">

  <div class="left">

    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <div class="logo">
      <img src="assets/logo.png">
      <span>MCN Engine</span>
    </div>

  </div>

  <div class="profile-btn" onclick="openLogin()">👤</div>

</div>

<!-- ================= MENU ================= -->

<div id="menu">

  <div onclick="goHome()">Home</div>
  <div onclick="goTrending()">Trending</div>
  <div onclick="goDashboard()">Dashboard</div>
  <div onclick="contact()">Contact</div>

</div>

<!-- ================= FEATURED ================= -->

<div class="featured" id="featuredPost"></div>

<!-- ================= FEED ================= -->

<div class="feed" id="feed">
  Loading posts...
</div>

<!-- ================= COOKIES ================= -->

<div id="cookieBanner" class="cookie-banner">

  <span>
    We use cookies to improve your experience.
    <a href="privacy.html" style="color:#5bc0be;">Privacy Policy</a>
  </span>

  <button onclick="acceptCookies()">Accept</button>

</div>

<!-- ================= LOGIN ================= -->

<div class="login-modal" id="loginModal">

  <div class="center-box">

    <img src="assets/logo.png" style="height:45px;display:block;margin:auto;">

    <h3 style="text-align:center;">MCN Engine</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Create Account</button>
    <button class="secondary-btn" onclick="login()">Login</button>
    <button onclick="closeLogin()">Close</button>

  </div>

</div>

<!-- ================= FOOTER ================= -->

<div class="footer">

  <a href="about.html">About</a> |
  <a href="faq.html">FAQ</a> |
  <a href="privacy.html">Privacy</a> |
  <a href="terms.html">Terms</a> |
  <a href="copyright.html">Copyright</a> |
  <a href="anti-spam.html">Anti-Spam</a> |
  <a href="ads-policy.html">Ads Policy</a> |
  <a href="dmca.html">DMCA</a>

  <br><br>

  <img src="assets/logo.png" class="footer-logo">

  © MCN Engine • All rights reserved

</div>

<!-- ================= SCRIPT ================= -->

<script>
(function () {

  const splash = document.getElementById("splashScreen");

  function hideSplash() {
    if (!splash) return;

    splash.style.opacity = "0";

    setTimeout(() => {
      splash.remove();
    }, 600);
  }

  window.addEventListener("load", () => {
    setTimeout(hideSplash, 700);
  });

  setTimeout(hideSplash, 3500);

})();
</script>

<script type="module" src="app.js"></script>

</body>
</html>
