<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine V15 — Monetization Control Network</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🚫 BUILD MODE: NO INDEXING -->
  <meta name="robots" content="noindex, nofollow, noarchive">

  <style>
    body {
      background: #0b132b;
      color: #fff;
      font-family: Arial;
      margin: 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: #1c2541;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .menu-btn {
      font-size: 22px;
      cursor: pointer;
    }

    .logo {
      font-size: 18px;
      font-weight: bold;
      color: #5bc0be;
    }

    .profile-btn {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: #5bc0be;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #000;
      font-weight: bold;
    }

    #menu {
      display: none;
      background: #1c2541;
      padding: 10px;
    }

    #menu div {
      padding: 10px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }

    .featured { padding: 15px; }

    .feed {
      padding: 15px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .post {
      background: linear-gradient(145deg, #1c2541, #141b2e);
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.25s;
      border: 1px solid transparent;
    }

    .post:hover {
      transform: translateY(-4px);
      border: 1px solid #5bc0be;
    }

    .post h4 { margin: 8px 0; font-size: 15px; }
    .post p { font-size: 13px; color: #ccc; }

    .login-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .center-box {
      background: #1c2541;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 350px;
    }

    /* ✅ LOGIN HEADER LOGO RESTORED */
    .login-header {
      text-align: center;
      margin-bottom: 10px;
    }

    .login-header h2 {
      margin: 0;
      color: #5bc0be;
    }

    .login-header small {
      color: #aaa;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      background: #0b132b;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      background: #5bc0be;
      color: #000;
      border: none;
      font-weight: bold;
    }

    .secondary-btn {
      background: transparent;
      border: 1px solid #5bc0be;
      color: #5bc0be;
    }

    .footer {
      text-align: center;
      padding: 25px;
      font-size: 13px;
      color: #aaa;
      margin-top: 40px;
    }

    /* ✅ FOOTER LOGO STYLE RESTORED */
    .footer-logo {
      font-size: 16px;
      font-weight: bold;
      color: #5bc0be;
      margin-bottom: 6px;
    }

    .footer-tagline {
      font-size: 12px;
      color: #888;
      margin-bottom: 10px;
    }

    .footer a {
      color: #5bc0be;
      text-decoration: none;
    }

    .cookie-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #1c2541;
      padding: 15px;
      display: none;
      justify-content: space-between;
      align-items: center;
      z-index: 9999;
      border-top: 1px solid #333;
    }

    .cookie-banner button {
      width: auto;
      padding: 8px 12px;
      margin-left: 10px;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="left">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="logo">MCN Engine</div>
  </div>

  <div class="profile-btn" onclick="openLogin()">👤</div>
</div>

<div id="menu">
  <div onclick="goHome()">Home</div>
  <div onclick="goTrending()">Trending</div>
  <div onclick="goDashboard()">Dashboard</div>
  <div onclick="contact()">Contact</div>
</div>

<div class="featured" id="featuredPost"></div>
<div class="feed" id="feed">Loading posts...</div>

<!-- COOKIE -->
<div id="cookieBanner" class="cookie-banner">
  <span>We use cookies to improve your experience.</span>
  <button onclick="acceptCookies()">Accept</button>
</div>

<!-- LOGIN (LOGO RESTORED INSIDE MODAL) -->
<div class="login-modal" id="loginModal">
  <div class="center-box">

    <div class="login-header">
      <h2>MCN Engine</h2>
      <small>Login / Register</small>
    </div>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Create Account</button>
    <button class="secondary-btn" onclick="login()">Login</button>
    <button onclick="closeLogin()">Close</button>
  </div>
</div>

<!-- FOOTER (RESTORED ORIGINAL STYLE) -->
<div class="footer">

  <div class="footer-logo">MCN Engine</div>
  <div class="footer-tagline">Discover. Learn. Explore.</div>

  <a href="about.html">About</a> |
  <a href="faq.html">FAQ</a> |
  <a href="privacy.html">Privacy</a> |
  <a href="terms.html">Terms</a> |
  <a href="copyright.html">Copyright</a> |
  <a href="anti-spam.html">Anti-Spam</a> |
  <a href="ads-policy.html">Ads Policy</a> |
  <a href="dmca.html">DMCA</a>

  <br><br>
  © 2026 MCN Engine — All Rights Reserved
</div>

<script>
function checkCookies() {
  if (!localStorage.getItem("cookieAccepted")) {
    document.getElementById("cookieBanner").style.display = "flex";
  }
}

window.acceptCookies = function () {
  localStorage.setItem("cookieAccepted", "true");
  document.getElementById("cookieBanner").style.display = "none";
};

checkCookies();

window.toggleMenu = function () {
  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
};

window.openLogin = function () {
  document.getElementById("loginModal").style.display = "flex";
};

window.closeLogin = function () {
  document.getElementById("loginModal").style.display = "none";
};

window.goDashboard = function () {
  document.getElementById("loginModal").style.display = "flex";
};

window.openPost = function (id) {
  if (!id) {
    alert("Post not available");
    return;
  }
  window.location.href = "./blog/post.html?id=" + id;
};

function getCategoryColor(cat) {
  switch (cat) {
    case "Crypto": return "#5bc0be";
    case "News": return "#ffcc00";
    case "Guide": return "#00ff88";
    case "Update": return "#ff6b6b";
    default: return "#aaa";
  }
}

async function loadFeed() {
  const feed = document.getElementById("feed");
  const featuredBox = document.getElementById("featuredPost");

  const PRIMARY = "https://mxm-backend.onrender.com/blog/list";
  const FALLBACK = "./feed-snapshot.json";

  let posts = null;

  try {
    const res = await fetch(PRIMARY);
    if (res.ok) posts = await res.json();
  } catch (e) {}

  if (!Array.isArray(posts) || posts.length === 0) {
    try {
      const res2 = await fetch(FALLBACK);
      posts = await res2.json();
    } catch (e2) {}
  }

  if (!Array.isArray(posts) || posts.length === 0) {
    feed.innerHTML = "<p>No content available</p>";
    return;
  }

  const sorted = posts.sort((a, b) =>
    new Date(b.createdAt || 0) - new Date(a.createdAt || 0)
  );

  const featured = sorted.find(p => p.featured) || sorted[0];

  featuredBox.innerHTML = `
    <div class="post" onclick="openPost('${featured?.id || ''}')" style="border:2px solid #5bc0be">
      <h3>🔥 Featured</h3>
      <h4>${featured?.title || ""}</h4>
      <p>${(featured?.content || "").slice(0,120)}...</p>
    </div>
  `;

  feed.innerHTML = "";

  sorted.forEach(p => {
    feed.innerHTML += `
      <div class="post" onclick="openPost('${p.id}')">
        <small style="color:${getCategoryColor(p.category)}">
          ${p.category || "General"}
        </small>
        <h4>${p.title || ""}</h4>
        <p>${(p.content || "").slice(0,90)}...</p>
      </div>
    `;
  });
}

loadFeed();

window.goHome = () => location.href = "index.html";
window.goTrending = () => document.getElementById("featuredPost")?.scrollIntoView({ behavior: "smooth" });
window.contact = () => window.location.href = "mailto:contact@mcnengine.com";
</script>

</body>
</html>
