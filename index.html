<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine V15 — Monetization Control Network</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="robots" content="noindex, nofollow, noarchive">

  <style>
    body {
      background: #0b132b;
      color: #fff;
      font-family: Arial;
      margin: 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: #1c2541;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .menu-btn {
      font-size: 22px;
      cursor: pointer;
    }

    .logo img {
      height: 28px;
      display: block;
    }

    .profile-btn {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: #5bc0be;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #000;
      font-weight: bold;
    }

    #menu {
      display: none;
      background: #1c2541;
      padding: 10px;
    }

    #menu div {
      padding: 10px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }

    .featured { padding: 15px; }

    .feed {
      padding: 15px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .post {
      background: linear-gradient(145deg, #1c2541, #141b2e);
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.25s;
    }

    .post:hover {
      transform: translateY(-4px);
      border: 1px solid #5bc0be;
    }

    .login-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .center-box {
      background: #1c2541;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 350px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      background: #0b132b;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      background: #5bc0be;
      color: #000;
      border: none;
      font-weight: bold;
    }

    .secondary-btn {
      background: transparent;
      border: 1px solid #5bc0be;
      color: #5bc0be;
    }

    .cookie-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #1c2541;
      padding: 15px;
      display: none;
      justify-content: space-between;
      align-items: center;
      z-index: 9999;
    }

    .cookie-banner button {
      width: auto;
      padding: 8px 12px;
    }

    .footer {
      text-align: center;
      padding: 25px;
      font-size: 13px;
      color: #aaa;
      margin-top: 40px;
    }

    .footer-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 8px;
    }

    .footer-logo img {
      height: 30px;
      margin-bottom: 5px;
    }

    .footer-tagline {
      font-size: 12px;
      color: #888;
      margin-bottom: 10px;
    }

    .footer a {
      color: #5bc0be;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="left">
    <div class="logo">
      <img src="logo.png" alt="MCN Logo">
    </div>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
  </div>

  <div class="profile-btn" onclick="toggleLogin()">👤</div>
</div>

<div id="menu">
  <div onclick="goHome()">Home</div>
  <div onclick="goTrending()">Trending</div>
  <div onclick="goDashboard()">Dashboard</div>
  <div onclick="contact()">Contact</div>
</div>

<div class="featured" id="featuredPost"></div>
<div class="feed" id="feed">Loading posts...</div>

<!-- COOKIE -->
<div id="cookieBanner" class="cookie-banner">
  <span>We use cookies to improve your experience.</span>
  <button onclick="acceptCookies()">Accept</button>
</div>

<!-- LOGIN -->
<div class="login-modal" id="loginModal">
  <div class="center-box">
    <h3>Login / Register</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Create Account</button>
    <button class="secondary-btn" onclick="login()">Login</button>
    <button onclick="toggleLogin()">Close</button>
  </div>
</div>

<!-- FOOTER RESTORED WITH LOGO PNG -->
<div class="footer">

  <div class="footer-logo">
    <img src="logo.png" alt="MCN Logo">
    <div>MCN Engine</div>
  </div>

  <div class="footer-tagline">Discover. Learn. Explore.</div>

  <a href="about.html">About</a> |
  <a href="faq.html">FAQ</a> |
  <a href="privacy.html">Privacy</a> |
  <a href="terms.html">Terms</a> |
  <a href="copyright.html">Copyright</a> |
  <a href="dmca.html">DMCA</a>

  <br><br>
  © 2026 MCN Engine — All Rights Reserved
</div>

<script>
/* COOKIE */
function checkCookies() {
  if (!localStorage.getItem("cookieAccepted")) {
    document.getElementById("cookieBanner").style.display = "flex";
  }
}

window.acceptCookies = function () {
  localStorage.setItem("cookieAccepted", "true");
  document.getElementById("cookieBanner").style.display = "none";
};

checkCookies();

/* MENU */
window.toggleMenu = function () {
  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
};

/* ✅ FIXED LOGIN TOGGLE (REAL WORKING STATE CONTROL) */
window.toggleLogin = function () {
  const modal = document.getElementById("loginModal");
  if (modal.style.display === "flex") {
    modal.style.display = "none";
  } else {
    modal.style.display = "flex";
  }
};

/* FEED SAFE */
async function loadFeed() {
  const feed = document.getElementById("feed");
  const featuredBox = document.getElementById("featuredPost");

  try {
    const res = await fetch("https://mxm-backend.onrender.com/blog/list");
    const posts = await res.json();

    if (!Array.isArray(posts)) {
      feed.innerHTML = "<p>Feed error</p>";
      return;
    }

    const sorted = posts.sort((a, b) =>
      new Date(b.createdAt || 0) - new Date(a.createdAt || 0)
    );

    const featured = sorted[0];

    featuredBox.innerHTML = `
      <div class="post" onclick="openPost('${featured?.id || ''}')">
        <h3>🔥 Featured</h3>
        <h4>${featured?.title || ""}</h4>
      </div>
    `;

    feed.innerHTML = "";

    sorted.forEach(p => {
      feed.innerHTML += `
        <div class="post" onclick="openPost('${p.id}')">
          <h4>${p.title}</h4>
        </div>
      `;
    });

  } catch (e) {
    feed.innerHTML = "<p>Failed to load content</p>";
  }
}

loadFeed();

window.openPost = function (id) {
  if (!id) return alert("Post not available");
  window.location.href = "./blog/post.html?id=" + id;
};

window.goHome = () => location.href = "index.html";
window.goTrending = () => document.getElementById("featuredPost")?.scrollIntoView({ behavior: "smooth" });
window.contact = () => location.href = "mailto:contact@mcnengine.com";
</script>

</body>
</html>
