<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine V15 — Monetization Control Network</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Discover websites, apps, and online opportunities with MCN Engine. Learn, explore, and grow online in one place.">

  <meta property="og:title" content="MCN Engine — Discover. Learn. Explore.">
  <meta property="og:description" content="Find websites, tools, and online opportunities easily.">
  <meta property="og:type" content="website">

  <style>
    body {
      background: #0b132b;
      color: #fff;
      font-family: Arial;
      margin: 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: #1c2541;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .menu-btn {
      font-size: 22px;
      cursor: pointer;
    }

    .logo {
      font-size: 18px;
      font-weight: bold;
      color: #5bc0be;
    }

    .profile-btn {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: #5bc0be;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #000;
      font-weight: bold;
    }

    #menu {
      display: none;
      background: #1c2541;
      padding: 10px;
    }

    #menu div {
      padding: 10px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }

    .featured {
      padding: 15px;
    }

    .feed {
      padding: 15px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .post {
      background: linear-gradient(145deg, #1c2541, #141b2e);
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.25s;
      border: 1px solid transparent;
    }

    .post:hover {
      transform: translateY(-4px);
      border: 1px solid #5bc0be;
    }

    .post h4 {
      margin: 8px 0;
      font-size: 15px;
    }

    .post p {
      font-size: 13px;
      color: #ccc;
    }

    .login-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .center-box {
      background: #1c2541;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 350px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      background: #0b132b;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      background: #5bc0be;
      color: #000;
      border: none;
      font-weight: bold;
    }

    .footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: #aaa;
      margin-top: 40px;
    }

    .footer a {
      color: #5bc0be;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="left">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="logo">MCN Engine</div>
  </div>
  <div class="profile-btn" onclick="openLogin()">👤</div>
</div>

<div id="menu">
  <div onclick="goHome()">Home</div>
  <div onclick="goTrending()">Trending</div>
  <div onclick="goDashboard()">Dashboard</div>
  <div onclick="goSettings()">Settings</div>
</div>

<div class="featured" id="featuredPost"></div>
<div class="feed" id="feed">Loading posts...</div>

<div class="login-modal" id="loginModal">
  <div class="center-box">
    <h3>Login / Register</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button>Create Account</button>
    <button>Login</button>
    <button onclick="closeLogin()">Close</button>
  </div>
</div>

<div class="footer">
  © MCN Engine
</div>

<script type="module">

window.toggleMenu = () => {
  const m = document.getElementById("menu");
  m.style.display = m.style.display === "block" ? "none" : "block";
};

window.openLogin = () => {
  document.getElementById("loginModal").style.display = "flex";
};

window.closeLogin = () => {
  document.getElementById("loginModal").style.display = "none";
};

window.openPost = (id) => {
  location.href = "./blog/post.html?id=" + id;
};

async function loadFeed() {
  const res = await fetch("https://mxm-backend.onrender.com/blog/list");
  const posts = await res.json();

  const feed = document.getElementById("feed");
  const featuredBox = document.getElementById("featuredPost");

  feed.innerHTML = "";

  const sorted = posts.sort((a,b) => new Date(b.createdAt||0)-new Date(a.createdAt||0));
  const featured = sorted[0];

  featuredBox.innerHTML = `
    <div class="post" onclick="openPost('${featured.id}')">
      <h3>🔥 Featured</h3>
      <h4>${featured.title}</h4>
    </div>
  `;

  sorted.forEach(p => {
    feed.innerHTML += `
      <div class="post" onclick="openPost('${p.id}')">
        <h4>${p.title}</h4>
        <p>${(p.content||"").slice(0,90)}...</p>
      </div>
    `;
  });
}

loadFeed();

window.goHome = () => location.href = "index.html";
window.goTrending = () => document.getElementById("featuredPost").scrollIntoView({behavior:"smooth"});
window.goDashboard = () => location.href = "dashboard.html";
window.goSettings = () => location.href = "settings.html";

</script>

</body>
</html>
