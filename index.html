<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MXM Crypto Empire</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background:#0b132b;
  color:white;
  text-align:center;
  padding:20px;
}

/* HEADER */
.hero {
  background:#1c2541;
  padding:20px;
  border-radius:12px;
  max-width:520px;
  margin:auto;
}

.logo {
  width:70px;
  height:70px;
  margin:auto;
  background:gold;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:black;
  font-size:20px;
}

.hero h2 {
  margin-top:10px;
  background: linear-gradient(to right, gold, white);
  -webkit-background-clip: text;
  color: transparent;
}

/* BETA */
.beta {
  position:absolute;
  left:10px;
  top:10px;
  background:gold;
  color:black;
  padding:4px 8px;
  border-radius:6px;
}

/* BUTTONS */
button {
  padding:12px;
  margin:8px;
  border:none;
  border-radius:6px;
  background:gold;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

/* DASHBOARD */
#dashboard { display:none; }

.card {
  background:#1c2541;
  padding:15px;
  margin:15px auto;
  border-radius:10px;
  max-width:520px;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
}

.modal-content {
  background:#1c2541;
  padding:20px;
  border-radius:10px;
  max-width:400px;
  margin:10% auto;
}

/* INPUT */
input, textarea {
  width:90%;
  padding:10px;
  margin:6px;
  border-radius:6px;
  border:none;
}

/* POPUP */
.popup {
  display:none;
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  background:red;
  padding:15px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="beta">BETA</div>

<div class="hero">
  <div class="logo">MXM</div>
  <h2>MXM Crypto Empire</h2>

  <button onclick="openRegister()">Register</button>
  <button onclick="openLogin()">Login</button>
</div>

<!-- REGISTER MODAL -->
<div class="modal" id="registerModal">
<div class="modal-content">
<h3>Register</h3>
<input id="regEmail" placeholder="Email">
<input id="regPassword" type="password" placeholder="Password">
<input id="regConfirm" type="password" placeholder="Confirm Password">
<button onclick="register()">Create Account</button>
<button onclick="closeModal('registerModal')">Close</button>
</div>
</div>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
<div class="modal-content">
<h3>Login</h3>
<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="resetPassword()">Forgot Password</button>
<button onclick="closeModal('loginModal')">Close</button>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<h2>Dashboard</h2>

<div class="card">
<h3>Free Earning Platform</h3>
<button onclick="openLink('earn')">Open</button>
</div>

<div class="card">
<h3>FixedFloat Exchange</h3>
<button onclick="openLink('float')">Open</button>
</div>

<div class="card">
<h3>Upload Proof Images</h3>
<input type="file" id="imgUpload">
<button onclick="uploadImage()">Upload</button>
<div id="gallery"></div>
</div>

<div class="card">
<h3>Contact Admin</h3>
<textarea id="message"></textarea>
<button onclick="sendMessage()">Send</button>
</div>

<button onclick="logout()">Logout</button>

</div>

<div id="popup" class="popup"></div>

<script type="module" src="app.js"></script>

</body>
</html>
