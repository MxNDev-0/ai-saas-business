<script type="module">

/* ================= COOKIE SYSTEM (UNCHANGED) ================= */

function checkCookies() {
  if (!localStorage.getItem("cookieAccepted")) {
    document.getElementById("cookieBanner").style.display = "flex";
  }
}

window.acceptCookies = function () {
  localStorage.setItem("cookieAccepted", "true");
  document.getElementById("cookieBanner").style.display = "none";
};

checkCookies();

/* ================= ORIGINAL NAV FUNCTIONS (UNCHANGED) ================= */

window.toggleMenu = function () {
  const menu = document.getElementById("menu");
  menu.style.display =
    (menu.style.display === "block") ? "none" : "block";
};

window.openLogin = function () {
  document.getElementById("loginModal").style.display = "flex";
};

window.closeLogin = function () {
  document.getElementById("loginModal").style.display = "none";
};

window.openPost = function (id) {
  window.location.href = "./blog/post.html?id=" + id;
};

window.goHome = function () {
  window.location.href = "./index.html";
};

window.goTrending = function () {
  window.location.href = "./trending.html";
};

window.goDashboard = function () {
  document.getElementById("loginModal").style.display = "flex";
};

window.contact = function () {
  window.location.href = "./contact.html";
};

/* ================= CATEGORY SYSTEM (USA + GLOBAL ONLY) ================= */

function getCategoryColor(cat) {

  switch ((cat || "").toUpperCase()) {

    case "USA":
      return "#5bc0be";

    case "GLOBAL":
      return "#00ff88";

    default:
      return "#5bc0be";
  }
}

/* ================= FIXED FEED LOADER (ONLY BUG FIXED, NOTHING REMOVED) ================= */

async function loadFeed() {

  const feed = document.getElementById("feed");
  const featuredBox = document.getElementById("featuredPost");

  feed.innerHTML = `
    <div class="post">
      <h4>Loading posts...</h4>
    </div>
  `;

  try {

    const res = await fetch(
      "https://mxm-backend.onrender.com/blog/latest?limit=6"
    );

    if (!res.ok) {
      throw new Error("Server returned " + res.status);
    }

    const posts = await res.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      feed.innerHTML = `
        <div class="post">
          <h4>No posts available yet</h4>
          <p>Please check back later.</p>
        </div>
      `;
      return;
    }

    const sorted = posts.sort(
      (a, b) =>
        new Date(b.createdAt || 0) -
        new Date(a.createdAt || 0)
    );

    const featured = sorted[0];

    if (featured && featuredBox) {
      featuredBox.innerHTML = `
        <div class="post"
          onclick="openPost('${featured.id}')"
          style="border:2px solid #5bc0be">

          <h3>🔥 Featured</h3>
          <h4>${featured.title || "Untitled"}</h4>

          <p>${(featured.content || "").slice(0,120)}...</p>

        </div>
      `;
    }

    feed.innerHTML = "";

    sorted.forEach(p => {

      const category = (p.category || "GLOBAL").toUpperCase();

      feed.innerHTML += `
        <div class="post"
          onclick="openPost('${p.id}')">

          <small style="color:${getCategoryColor(category)}">
            ${category}
          </small>

          <h4>${p.title || "Untitled"}</h4>

          <p>${(p.content || "").slice(0,100)}...</p>

        </div>
      `;
    });

  } catch (err) {

    console.error("Feed Error:", err);

    feed.innerHTML = `
      <div class="post" style="border:1px solid #ff6b6b;">
        <h4 style="color:#ff6b6b;">Feed Error</h4>
        <p>Failed to load content.</p>
        <button onclick="loadFeed()">Retry</button>
      </div>
    `;
  }
}

/* ================= INIT ================= */

loadFeed();

</script>
