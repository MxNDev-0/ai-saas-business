<!-- CLEAN MCN ADMIN PANEL -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MCN Admin Control Room</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background:#0b132b;
      color:white;
      font-family:Arial;
      margin:0;
      padding:20px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:15px;
    }

    .card {
      background:#1c2541;
      padding:12px;
      border-radius:10px;
    }

    input,textarea,select {
      width:100%;
      padding:10px;
      margin:6px 0;
      border-radius:8px;
      border:none;
      background:#0b132b;
      color:white;
    }

    button {
      width:100%;
      padding:10px;
      border:none;
      border-radius:8px;
      background:#5bc0be;
      font-weight:bold;
      cursor:pointer;
      margin-top:6px;
    }

    .danger { background:red; }

    .list-box {
      max-height:220px;
      overflow:auto;
      background:#0b132b;
      padding:6px;
      border-radius:8px;
    }

    .item {
      background:#16213e;
      padding:8px;
      margin-bottom:6px;
      border-radius:8px;
    }
  </style>
</head>

<body>

<h2>👑 MCN Admin Panel</h2>

<div class="grid">

  <!-- SYSTEM -->
  <div class="card">
    <h3>🖥 System Monitor</h3>
    <div id="monitor">Online</div>
  </div>

  <!-- BLOG -->
  <div class="card">
    <h3>📝 Create Blog</h3>

    <input id="blogTitle" placeholder="Title">
    <textarea id="blogContent" placeholder="Content"></textarea>
    <input id="blogImage" placeholder="Image URL">

    <button onclick="createBlog()">Publish</button>

    <button onclick="openPostManager()">
      Open Post Manager
    </button>
  </div>

  <!-- ADS -->
  <div class="card">
    <h3>📢 Ad Requests</h3>
    <div id="upgradeList" class="list-box"></div>
  </div>

  <!-- POSTS CONTROL -->
  <div class="card">
    <h3>⚙ Post Control</h3>
    <p style="font-size:12px;opacity:0.7;">
      Use Post Manager for edit/delete operations
    </p>

    <button onclick="openPostManager()">
      Manage Posts
    </button>
  </div>

  <!-- MAINTENANCE -->
  <div class="card">
    <h3>🛠 Maintenance</h3>

    <label>
      <input type="checkbox" id="maintenanceToggle">
      Enable Maintenance
    </label>

    <button onclick="saveMaintenanceMode()">
      Save
    </button>
  </div>

</div>

<script>
function openPostManager(){
  window.location.href = "./post-manager.html";
}
</script>

<script type="module" src="./admin-auth.js"></script>
<script type="module" src="./emergency-control.js"></script>
<script type="module" src="./admin-loader.js"></script>

</body>
</html>
