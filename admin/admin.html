<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine V18 - AI Admin Control</title>

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <style>

    body{
      background:#0b132b;
      color:white;
      font-family:Arial;
      margin:0;
      padding:20px;
    }

    h2{
      margin-bottom:20px;
      color:#5bc0be;
    }

    .grid{
      display:grid;
      grid-template-columns:
      repeat(auto-fit,minmax(280px,1fr));
      gap:15px;
    }

    .card{
      background:#1c2541;
      border-radius:14px;
      padding:14px;
      box-sizing:border-box;
    }

    input,
    textarea{
      width:100%;
      padding:10px;
      margin:6px 0;
      border:none;
      border-radius:8px;
      background:#0b132b;
      color:white;
      box-sizing:border-box;
    }

    textarea{
      min-height:100px;
      resize:none;
    }

    button{
      width:100%;
      padding:10px;
      border:none;
      border-radius:8px;
      background:#5bc0be;
      color:black;
      font-weight:bold;
      cursor:pointer;
      margin-top:5px;
    }

    .danger{
      background:red;
      color:white;
    }

    .monitor{
      background:#05070f;
      border:1px solid #233;
      height:260px;
      overflow-y:auto;
      border-radius:10px;
      padding:10px;
      font-family:monospace;
      color:#00ff88;
    }

    .list-box{
      background:#0b132b;
      border-radius:10px;
      padding:8px;
      max-height:260px;
      overflow-y:auto;
    }

    .item{
      background:#16213e;
      padding:10px;
      border-radius:8px;
      margin-bottom:8px;
    }

    .small-btn{
      width:auto;
      padding:5px 8px;
      margin-top:6px;
      margin-right:5px;
      font-size:12px;
    }

  </style>
</head>

<body>

<h2>
  👑 MCN Engine Admin V18
</h2>

<div class="grid">

  <!-- MONITOR -->
  <div class="card">

    <h3>🖥 System Monitor</h3>

    <div id="monitor"
      class="monitor"></div>

  </div>

  <!-- AI WRITER -->
  <div class="card">

    <h3>🤖 AI Blog Writer</h3>

    <input
      id="aiTopic"
      placeholder="Enter topic">

    <button onclick="generateAI()">
      Generate Article
    </button>

  </div>

  <!-- BLOG -->
  <div class="card">

    <h3>📝 Create Blog</h3>

    <input
      id="blogTitle"
      placeholder="Blog title">

    <textarea
      id="blogContent"
      placeholder="Blog content"></textarea>

    <input
      id="blogImage"
      placeholder="Image URL">

    <button onclick="createBlog()">
      Publish Blog
    </button>

  </div>

  <!-- GOOGLE NEWS -->
  <div class="card">

    <h3>📰 Google News</h3>

    <input
      id="newsKeyword"
      placeholder="Search topic">

    <button onclick="loadNews()">
      Load News
    </button>

    <div
      id="newsList"
      class="list-box">
    </div>

  </div>

  <!-- POSTS -->
  <div class="card">

    <h3>💬 Post Manager</h3>

    <input
      id="searchPosts"
      placeholder="Search posts..."
      onkeyup="searchPosts()">

    <div
      id="postsList"
      class="list-box">
    </div>

  </div>

  <!-- EDIT -->
  <div class="card">

    <h3>✏️ Edit Post</h3>

    <input id="editPostId" readonly>

    <input id="editPostTitle">

    <textarea
      id="editPostContent"></textarea>

    <button onclick="updatePost()">
      Update Post
    </button>

  </div>

  <!-- ADS -->
  <div class="card">

    <h3>📢 Ad Requests</h3>

    <div
      id="upgradeList"
      class="list-box">
    </div>

  </div>

  <!-- REJECTED -->
  <div class="card">

    <h3>❌ Rejected Ads</h3>

    <div
      id="rejectedList"
      class="list-box">
    </div>

    <button
      class="danger"
      onclick="clearRejected()">

      Clear Rejected

    </button>

  </div>

  <!-- DIAGNOSTICS -->
  <div class="card">

    <h3>🧠 Diagnostics</h3>

    <div class="list-box">

      <div class="item">
        Firebase: ✅ Connected
      </div>

      <div class="item">
        Admin Loader: ✅ Active
      </div>

      <div class="item">
        AI Monitor: ✅ Running
      </div>

      <div class="item">
        MCN Engine Core: ✅ Stable
      </div>

    </div>

  </div>

</div>

<script type="module"
  src="./admin-loader.js">
</script>

</body>
</html>
