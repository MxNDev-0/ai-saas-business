<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>MCN Admin Panel V17 (RESTORED + MERGED)</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:#0b132b;
  color:#fff;
  font-family:Arial;
  margin:0;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:15px;
}

.card {
  background:#1c2541;
  padding:12px;
  border-radius:10px;
}

input, textarea, select {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
  background:#0b132b;
  color:white;
}

button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#5bc0be;
  font-weight:bold;
  cursor:pointer;
}

.danger { background:red; }

.monitor {
  background:#05070f;
  color:#00ff88;
  height:250px;
  overflow:auto;
  font-family:monospace;
  padding:10px;
  border-radius:10px;
}

/* placeholders */
.placeholder-box {
  background:#0b132b;
  padding:10px;
  border-radius:8px;
}

.toggle-row {
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin:4px 0;
}

.section-title {
  margin-top:10px;
  font-size:13px;
  opacity:0.7;
}
</style>
</head>

<body>

<h2>👑 MCN Admin Panel V17 (FINAL MERGED)</h2>

<div class="grid">

  <!-- SYSTEM MONITOR -->
  <div class="card">
    <h3>🖥 System Monitor</h3>
    <div id="monitor" class="monitor"></div>
  </div>

  <!-- POSTS -->
  <div class="card">
    <h3>💬 Post Manager</h3>
    <div id="postsList"></div>

    <h3>✏️ Edit Post</h3>

    <input id="editPostId" placeholder="Post ID">
    <input id="editTitle" placeholder="Title">
    <textarea id="editContent" placeholder="Content"></textarea>

    <div class="section-title">Post Flags</div>

    <div class="toggle-row">
      <label>Homepage</label>
      <input type="checkbox" id="e_homepage">
    </div>

    <div class="toggle-row">
      <label>Featured</label>
      <input type="checkbox" id="e_featured">
    </div>

    <div class="toggle-row">
      <label>Trending</label>
      <input type="checkbox" id="e_trending">
    </div>

    <div class="toggle-row">
      <label>Sponsored</label>
      <input type="checkbox" id="e_sponsored">
    </div>

    <div class="section-title">Monetization Controls</div>

    <input id="e_adExpiry" type="datetime-local" placeholder="Expiry">
    <input id="e_adPriority" type="number" placeholder="Priority (0-10)">

    <button onclick="updatePost()">Update Post</button>
  </div>

  <!-- PLACEHOLDER CONTROL -->
  <div class="card">
    <h3>⭐ Placeholder Control</h3>

    <div class="placeholder-box">

      <div class="toggle-row">
        <label>Homepage Slot</label>
        <input type="checkbox" id="c_homepage">
      </div>

      <div class="toggle-row">
        <label>Featured Slot</label>
        <input type="checkbox" id="c_featured">
      </div>

      <div class="toggle-row">
        <label>Trending Slot</label>
        <input type="checkbox" id="c_trending">
      </div>

      <div class="toggle-row">
        <label>Sponsored Slot</label>
        <input type="checkbox" id="c_sponsored">
      </div>

      <div class="section-title">Ad Placement Slots</div>

      <select id="placeholderSlot">
        <option value="">None</option>
        <option value="hero">Hero Banner</option>
        <option value="featured1">Featured 1</option>
        <option value="featured2">Featured 2</option>
        <option value="sidebar">Sidebar</option>
        <option value="popup">Popup</option>
      </select>

      <input id="placeholderText" placeholder="Placeholder Text">

    </div>
  </div>

</div>

<script type="module" src="./admin-loader.js"></script>

</body>
</html>
