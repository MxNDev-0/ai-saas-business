<!DOCTYPE html>
<html>
<head>

  <meta charset="UTF-8">

  <title>MCN Admin PWA</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="theme-color"
    content="#5bc0be"
  >

  <link
    rel="manifest"
    href="./admin-manifest.json"
  >

  <link
    rel="icon"
    href="../../icons/icon-192.png"
  >

  <style>

    body{

      margin:0;

      background:#0b132b;

      color:white;

      font-family:Arial;

      display:flex;

      justify-content:center;

      align-items:center;

      height:100vh;

      text-align:center;
    }

    .box{

      background:#1c2541;

      padding:30px;

      border-radius:20px;

      width:90%;

      max-width:400px;

      box-sizing:border-box;
    }

    h1{
      margin-top:0;
    }

    p{
      color:#ccc;
      line-height:1.6;
    }

    button,
    a{

      display:block;

      margin-top:15px;

      padding:14px;

      background:#5bc0be;

      color:black;

      text-decoration:none;

      border-radius:10px;

      font-weight:bold;

      border:none;

      cursor:pointer;

      width:100%;

      box-sizing:border-box;
    }

    #installBtn{

      display:none;
    }

  </style>

</head>

<body>

<div class="box">

  <h1>👑 MCN Admin Control</h1>

  <p>
    Standalone Admin PWA Launcher
  </p>

  <button id="installBtn">
    📲 Install Admin App
  </button>

  <a href="../admin.html">
    🚀 Open Admin Panel
  </a>

</div>

<script>

let deferredPrompt = null;

const installBtn =
  document.getElementById(
    "installBtn"
  );

/* ================= PWA INSTALL ================= */

window.addEventListener(
  "beforeinstallprompt",
  (e) => {

    e.preventDefault();

    deferredPrompt = e;

    installBtn.style.display =
      "block";
  }
);

installBtn.addEventListener(
  "click",
  async () => {

    if (!deferredPrompt) return;

    deferredPrompt.prompt();

    const result =
      await deferredPrompt.userChoice;

    console.log(
      "PWA Install:",
      result.outcome
    );

    deferredPrompt = null;

    installBtn.style.display =
      "none";
  }
);

/* ================= SERVICE WORKER ================= */

if ("serviceWorker" in navigator) {

  navigator.serviceWorker.register(
    "./admin-sw.js"
  )
  .then(() => {

    console.log(
      "✅ Admin SW Ready"
    );

  })
  .catch(err => {

    console.error(
      "SW Failed:",
      err
    );

  });
}

</script>

</body>
</html>
