<!DOCTYPE html>
<html>
<head>

  <meta charset="UTF-8">

  <title>MCN Admin Control</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="theme-color"
    content="#5bc0be"
  >

  <link
    rel="manifest"
    href="./admin-manifest.json"
  >

  <link
    rel="icon"
    href="../../icons/icon-192.png"
  >

  <style>

    *{
      box-sizing:border-box;
    }

    body{

      margin:0;

      background:#0b132b;

      color:white;

      font-family:Arial;

      display:flex;

      justify-content:center;

      align-items:center;

      height:100vh;

      overflow:hidden;

      text-align:center;
    }

    .box{

      background:#1c2541;

      width:90%;

      max-width:420px;

      padding:35px;

      border-radius:22px;

      box-shadow:
        0 0 40px rgba(0,0,0,0.4);
    }

    h1{

      margin-top:0;

      margin-bottom:10px;
    }

    p{

      color:#ccc;

      line-height:1.7;

      margin-bottom:25px;
    }

    button,
    a{

      display:block;

      width:100%;

      margin-top:15px;

      padding:15px;

      border:none;

      border-radius:12px;

      background:#5bc0be;

      color:black;

      font-weight:bold;

      text-decoration:none;

      cursor:pointer;

      font-size:15px;
    }

    #installBtn{

      display:none;
    }

    .loader{

      width:60px;

      height:60px;

      margin:25px auto;

      border-radius:50%;

      border:5px solid #233;

      border-top:5px solid #5bc0be;

      animation:spin 1s linear infinite;
    }

    @keyframes spin{

      100%{
        transform:rotate(360deg);
      }
    }

    .small{

      margin-top:20px;

      font-size:12px;

      opacity:0.7;
    }

  </style>

</head>

<body>

<div class="box">

  <h1>👑 MCN Admin Control</h1>

  <p>
    Secure Standalone Admin Launcher
  </p>

  <div class="loader"></div>

  <button id="installBtn">
    📲 Install Admin App
  </button>

  <a href="../admin.html">
    🚀 Enter Control Room
  </a>

  <div class="small">

    Initializing secure environment...

  </div>

</div>

<script>

/* ================= AUTO REDIRECT ================= */

setTimeout(() => {

  location.href =
    "../admin.html";

}, 1800);

/* ================= INSTALL PROMPT ================= */

let deferredPrompt = null;

const installBtn =
  document.getElementById(
    "installBtn"
  );

window.addEventListener(
  "beforeinstallprompt",
  (e) => {

    e.preventDefault();

    deferredPrompt = e;

    installBtn.style.display =
      "block";
  }
);

installBtn.addEventListener(
  "click",
  async () => {

    if (!deferredPrompt) return;

    deferredPrompt.prompt();

    const result =
      await deferredPrompt.userChoice;

    console.log(
      "Install Result:",
      result.outcome
    );

    deferredPrompt = null;

    installBtn.style.display =
      "none";
  }
);

/* ================= SERVICE WORKER ================= */

if ("serviceWorker" in navigator) {

  navigator.serviceWorker.register(
    "./admin-sw.js"
  )
  .then(() => {

    console.log(
      "✅ Admin SW Active"
    );

  })
  .catch(err => {

    console.error(
      "SW Error:",
      err
    );

  });
}

</script>

</body>
</html>
