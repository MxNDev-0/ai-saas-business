<!DOCTYPE html>
<html>
<head>

  <meta charset="UTF-8">

  <title>MCN Admin PWA</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="theme-color"
    content="#5bc0be"
  >

  <link
    rel="manifest"
    href="./admin-manifest.json"
  >

  <link
    rel="icon"
    href="../../icons/icon-192.png"
  >

  <style>

    body{

      margin:0;

      background:#0b132b;

      color:white;

      font-family:Arial;

      display:flex;

      justify-content:center;

      align-items:center;

      height:100vh;

      text-align:center;
    }

    .box{

      background:#1c2541;

      padding:30px;

      border-radius:20px;

      width:90%;

      max-width:400px;
    }

    a{

      display:block;

      margin-top:20px;

      padding:12px;

      background:#5bc0be;

      color:black;

      text-decoration:none;

      border-radius:10px;

      font-weight:bold;
    }

  </style>

</head>

<body>

<div class="box">

  <h1>👑 MCN Admin Control</h1>

  <p>
    Standalone Admin PWA Launcher
  </p>

  <a href="../admin.html">

    Open Admin Panel

  </a>

</div>

<script>

if ("serviceWorker" in navigator) {

  navigator.serviceWorker.register(
    "./admin-sw.js"
  );

}

</script>

</body>
</html>
