<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine V17 - AI Admin Control Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0b132b;
      color: #fff;
      font-family: Arial;
      margin: 0;
      padding: 20px;
    }

    h2 { margin-bottom: 15px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 15px;
    }

    .card {
      background: #1c2541;
      padding: 12px;
      border-radius: 10px;
      box-sizing: border-box;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      background: #0b132b;
      color: white;
      box-sizing: border-box;
    }

    textarea { min-height: 90px; resize: none; }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      background: #5bc0be;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      border: none;
      margin-top: 5px;
    }

    .danger { background: red; color: white; }

    .list-box {
      max-height: 220px;
      overflow-y: auto;
      background: #0b132b;
      border-radius: 8px;
      padding: 6px;
    }

    .item {
      padding: 8px;
      margin-bottom: 6px;
      background: #16213e;
      border-radius: 8px;
    }

    .monitor {
      background: linear-gradient(145deg, #05070f, #0a0f1f);
      color: #00ff88;
      height: 260px;
      overflow-y: auto;
      font-family: monospace;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #1c2541;
    }

    .small-btn {
      width: auto;
      padding: 4px 6px;
      font-size: 12px;
      margin-left: 5px;
    }

    /* 🔥 ONLY ADDED (NO REMOVAL) */
    .toggle-row {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
      font-size: 13px;
    }
  </style>
</head>

<body>

<h2>👑 MCN Admin Panel V17 (AI Powered)</h2>

<div class="grid">

  <div class="card">
    <h3>🖥 System Monitor</h3>
    <div id="monitor" class="monitor"></div>
  </div>

  <!-- ================= BLOG CREATOR (INJECTED ONLY) ================= -->
  <div class="card">
    <h3>📝 Create Blog</h3>

    <input id="blogTitle" placeholder="Blog Title">
    <textarea id="blogContent" placeholder="Blog Content"></textarea>
    <input id="blogImage" placeholder="Image URL">

    <!-- 🔥 INJECTED CONTROLS (NOT REMOVING ANYTHING) -->
    <div class="toggle-row">
      <label>Homepage</label>
      <input type="checkbox" id="c_homepage">
    </div>

    <div class="toggle-row">
      <label>Featured</label>
      <input type="checkbox" id="c_featured">
    </div>

    <div class="toggle-row">
      <label>Trending</label>
      <input type="checkbox" id="c_trending">
    </div>

    <div class="toggle-row">
      <label>Sponsored</label>
      <input type="checkbox" id="c_sponsored">
    </div>

    <input id="adExpiry" type="datetime-local">
    <input id="adPriority" type="number" placeholder="Priority (0-10)">

    <button onclick="createBlog()">Publish Blog</button>
  </div>

  <!-- ================= KEEP YOUR EXISTING BLOCKS ================= -->

  <div class="card">
    <h3>🤖 AI Blog Writer</h3>
    <input id="aiTopic" placeholder="Enter topic">
    <button onclick="generateAI()">Generate Article</button>
  </div>

  <div class="card">
    <h3>⏱ Auto Scheduler</h3>
    <input id="scheduleTitle" placeholder="Blog Title">
    <textarea id="scheduleContent"></textarea>
    <input id="scheduleTime" type="datetime-local">
    <button onclick="schedulePost()">Schedule</button>
  </div>

  <div class="card">
    <h3>🔔 Broadcast</h3>
    <input id="broadcastTitle">
    <textarea id="broadcastMessage"></textarea>
    <button onclick="sendBroadcast()">Send</button>
  </div>

  <div class="card">
    <h3>👥 Users</h3>
    <div id="usersList" class="list-box"></div>
  </div>

  <div class="card">
    <h3>📢 Ad Requests</h3>
    <div id="upgradeList" class="list-box"></div>
  </div>

  <!-- ================= POST MANAGER (ONLY INJECTED EDIT FLAGS) ================= -->
  <div class="card">
    <h3>💬 Post Manager</h3>
    <div id="postsList" class="list-box"></div>

    <h3>✏️ Edit Post</h3>

    <input id="editPostId" readonly>
    <input id="editPostTitle">
    <textarea id="editPostContent"></textarea>

    <!-- 🔥 INJECTED ONLY -->
    <div class="toggle-row">
      <label>Homepage</label>
      <input type="checkbox" id="e_homepage">
    </div>

    <div class="toggle-row">
      <label>Featured</label>
      <input type="checkbox" id="e_featured">
    </div>

    <div class="toggle-row">
      <label>Trending</label>
      <input type="checkbox" id="e_trending">
    </div>

    <div class="toggle-row">
      <label>Sponsored</label>
      <input type="checkbox" id="e_sponsored">
    </div>

    <input id="e_adExpiry" type="datetime-local">
    <input id="e_adPriority" type="number">

    <button onclick="updatePost()">Update Post</button>
  </div>

  <div class="card">
    <h3>❌ Rejected Ads</h3>
    <div id="rejectedList" class="list-box"></div>
    <button class="danger" onclick="clearRejected()">Clear Rejected</button>
  </div>

</div>

<script type="module" src="./admin.js"></script>

</body>
</html>
