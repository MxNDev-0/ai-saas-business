<!DOCTYPE html>
<html>
<head>
  <title>Admin Control Panel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">
  <h2>👑 Admin Control Panel</h2>

  <h3>💰 Update Wallet Balance</h3>

  <input id="balanceInput" placeholder="Enter new balance">

  <button onclick="updateWallet()">
    Update Wallet
  </button>

  <hr>

  <h3>➕ Add Earnings Entry</h3>

  <input id="source" placeholder="Source (e.g. ForFans)">
  <input id="amount" placeholder="Amount">

  <button onclick="addEarning()">
    Add Earnings
  </button>

</div>

<script type="module" src="admin.js"></script>
</body>
</html>
