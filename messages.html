<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <title>MCN Engine Messages</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: 320px;
      background: #1c2541;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.1);
      overflow-y: auto;
    }

    .top {
      padding: 15px;
      font-weight: bold;
      font-size: 18px;
      background: #16213e;
    }

    .item {
      padding: 12px;
      margin: 8px;
      background: #16213e;
      border-radius: 10px;
      cursor: pointer;
    }

    .item:hover {
      background: #243b67;
    }

    /* CHAT */
    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .chat-header {
      background: #1c2541;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header button {
      background: #5bc0be;
      border: none;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    #chatBox {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      max-width: 70%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      word-wrap: break-word;
    }

    .me {
      background: #5bc0be;
      color: black;
      margin-left: auto;
    }

    .them {
      background: #16213e;
    }

    .input {
      display: flex;
      padding: 10px;
      background: #1c2541;
      gap: 8px;
    }

    .input input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    .input button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #5bc0be;
      font-weight: bold;
      cursor: pointer;
    }

    .tools button {
      background: #243b67;
      color: white;
    }

  </style>

</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="top">Messages</div>

    <div id="inboxList"></div>

  </div>

  <!-- CHAT -->
  <div class="chat">

    <div class="chat-header">

      <div id="chatUsername">Select Chat</div>

      <div>

        <button onclick="startCall()">📞</button>

      </div>

    </div>

    <div id="chatBox"></div>

    <div class="input">

      <button onclick="pickFile()">📎</button>

      <button onclick="startVoice()">🎤</button>

      <input id="msgInput" placeholder="Type message...">

      <button onclick="sendMsg()">Send</button>

    </div>

  </div>

</div>

<input type="file" id="fileInput" hidden>

<script type="module" src="messages.js"></script>

</body>

</html>
