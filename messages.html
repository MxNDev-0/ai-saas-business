<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Messages</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* MOBILE FIRST */
    .app {
      display: flex;
      height: 100%;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 100%;
      max-width: 100%;
      background: #1c2541;
      overflow-y: auto;
    }

    .chat-item {
      padding: 12px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }

    .chat-item:hover {
      background: #111a33;
    }

    .chat-name {
      font-weight: bold;
    }

    .chat-last {
      font-size: 12px;
      opacity: 0.7;
    }

    /* CHAT AREA */
    .chat-area {
      position: fixed;
      top: 0;
      left: 100%;
      width: 100%;
      height: 100%;
      background: #0b132b;
      display: flex;
      flex-direction: column;
      transition: 0.3s;
    }

    .chat-area.active {
      left: 0;
    }

    .header {
      padding: 10px;
      background: #1c2541;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back-btn {
      cursor: pointer;
      margin-right: 10px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      max-width: 75%;
      padding: 8px;
      margin: 5px 0;
      border-radius: 10px;
      font-size: 14px;
    }

    .me {
      background: #5bc0be;
      color: black;
      margin-left: auto;
    }

    .other {
      background: #1c2541;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: #1c2541;
      gap: 6px;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
    }

    button {
      padding: 10px 14px;
      background: #5bc0be;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .typing {
      font-size: 12px;
      opacity: 0.7;
    }

    /* DESKTOP MODE */
    @media(min-width: 768px){
      .sidebar {
        width: 30%;
      }

      .chat-area {
        position: relative;
        left: 0;
        width: 70%;
      }

      .chat-area.active {
        left: 0;
      }
    }
  </style>
</head>

<body>

<div class="app">

  <!-- CHAT LIST -->
  <div class="sidebar" id="chatList"></div>

  <!-- CHAT WINDOW -->
  <div class="chat-area" id="chatArea">

    <div class="header">
      <span class="back-btn" onclick="goBack()">←</span>
      <div id="activeUser">Select chat</div>
      <div class="typing" id="typing"></div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-box">
      <input id="msgInput" placeholder="Type message..." disabled>
      <button id="sendBtn" onclick="sendMsg()" disabled>Send</button>
    </div>

  </div>

</div>

<script type="module" src="messages.js"></script>

<script>
function goBack(){
  document.getElementById("chatArea").classList.remove("active");
}

/* HOOK INTO YOUR EXISTING FUNCTION */
const originalOpenChat = window.openChat;

window.openChat = function(uid){
  if(originalOpenChat) originalOpenChat(uid);

  document.getElementById("chatArea").classList.add("active");
};
</script>

</body>
</html>
