<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <title>MCN Messages</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
  >

  <meta
    name="theme-color"
    content="#0b132b"
  >

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {

      width: 100%;
      height: 100%;

      overflow: hidden;

      font-family: Arial, sans-serif;

      background: #0b132b;

      color: white;
    }

    body {
      position: fixed;
      inset: 0;
    }

    /* ================= APP ================= */

    .app {

      width: 100%;
      height: 100%;

      position: relative;

      overflow: hidden;
    }

    /* ================= INBOX ================= */

    .inbox-screen {

      position: absolute;

      inset: 0;

      background: #0b132b;

      display: flex;

      flex-direction: column;

      z-index: 2;

      transition: transform 0.25s ease;
    }

    .inbox-header {

      padding: 18px 15px;

      background: #1c2541;

      font-size: 20px;

      font-weight: bold;

      display: flex;

      align-items: center;

      justify-content: space-between;
    }

    .search-wrap {

      padding: 10px;
    }

    .search-wrap input {

      width: 100%;

      padding: 12px;

      border: none;

      border-radius: 12px;

      background: #1c2541;

      color: white;

      outline: none;
    }

    #inboxList {

      flex: 1;

      overflow-y: auto;

      padding: 10px;
    }

    .chat-item {

      display: flex;

      align-items: center;

      gap: 12px;

      padding: 12px;

      margin-bottom: 10px;

      background: #1c2541;

      border-radius: 14px;

      cursor: pointer;
    }

    .chat-item img {

      width: 50px;

      height: 50px;

      border-radius: 50%;

      object-fit: cover;
    }

    .chat-info {

      flex: 1;
    }

    .chat-name {

      font-weight: bold;

      margin-bottom: 4px;
    }

    .chat-preview {

      font-size: 13px;

      opacity: 0.7;
    }

    .unread {

      min-width: 22px;

      height: 22px;

      border-radius: 50%;

      background: #5bc0be;

      color: black;

      font-size: 12px;

      font-weight: bold;

      display: flex;

      align-items: center;

      justify-content: center;
    }

    /* ================= CHAT SCREEN ================= */

    .chat-screen {

      position: absolute;

      inset: 0;

      background: #0b132b;

      z-index: 5;

      transform: translateX(100%);

      transition: transform 0.25s ease;

      display: flex;

      flex-direction: column;
    }

    .chat-screen.active {

      transform: translateX(0);
    }

    /* ================= CHAT HEADER ================= */

    .chat-header {

      background: #1c2541;

      padding: 12px;

      display: flex;

      align-items: center;

      gap: 10px;
    }

    .back-btn {

      background: none;

      border: none;

      color: white;

      font-size: 20px;

      cursor: pointer;
    }

    .chat-header img {

      width: 42px;

      height: 42px;

      border-radius: 50%;

      object-fit: cover;
    }

    .chat-user {

      flex: 1;
    }

    .chat-user-name {

      font-weight: bold;
    }

    .typing {

      font-size: 12px;

      opacity: 0.7;

      margin-top: 2px;
    }

    .header-actions {

      display: flex;

      gap: 8px;
    }

    .header-actions button {

      background: #243b67;

      border: none;

      color: white;

      border-radius: 10px;

      padding: 10px;

      cursor: pointer;
    }

    /* ================= CHAT BOX ================= */

    #chatBox {

      flex: 1;

      overflow-y: auto;

      padding: 15px;

      display: flex;

      flex-direction: column;
    }

    .msg {

      max-width: 80%;

      padding: 12px;

      border-radius: 14px;

      margin-bottom: 10px;

      word-wrap: break-word;

      position: relative;
    }

    .me {

      background: #5bc0be;

      color: black;

      align-self: flex-end;

      border-bottom-right-radius: 5px;
    }

    .them {

      background: #1c2541;

      border-bottom-left-radius: 5px;
    }

    .msg img {

      width: 100%;

      border-radius: 10px;

      margin-bottom: 6px;
    }

    .msg audio {

      width: 220px;
    }

    .meta {

      margin-top: 5px;

      font-size: 10px;

      opacity: 0.7;

      text-align: right;
    }

    /* ================= INPUT ================= */

    .input-wrap {

      padding: 10px;

      background: #1c2541;

      display: flex;

      align-items: center;

      gap: 8px;
    }

    .tool-btn {

      background: #243b67;

      border: none;

      color: white;

      border-radius: 10px;

      padding: 10px;

      cursor: pointer;
    }

    #msgInput {

      flex: 1;

      padding: 12px;

      border-radius: 14px;

      border: none;

      background: #0b132b;

      color: white;

      outline: none;
    }

    .send-btn {

      background: #5bc0be;

      color: black;

      border: none;

      border-radius: 12px;

      padding: 12px 16px;

      font-weight: bold;

      cursor: pointer;
    }

  </style>

</head>

<body>

<div class="app">

  <!-- ================= INBOX ================= -->

  <div class="inbox-screen">

    <div class="inbox-header">

      <span>
        Messages
      </span>

      <span>
        💬
      </span>

    </div>

    <div class="search-wrap">

      <input
        id="searchInput"
        placeholder="Search chats..."
      >

    </div>

    <div id="inboxList"></div>

  </div>

  <!-- ================= CHAT ================= -->

  <div
    id="chatScreen"
    class="chat-screen"
  >

    <div class="chat-header">

      <button
        class="back-btn"
        onclick="closeChat()"
      >
        ←
      </button>

      <img
        id="chatAvatar"
        src="https://via.placeholder.com/50"
      >

      <div class="chat-user">

        <div
          id="chatUsername"
          class="chat-user-name"
        >
          User
        </div>

        <div
          id="typingIndicator"
          class="typing"
        >
        </div>

      </div>

      <div class="header-actions">

        <button onclick="startCall()">
          📞
        </button>

        <button onclick="deleteChat()">
          🗑
        </button>

      </div>

    </div>

    <!-- CHAT -->

    <div id="chatBox"></div>

    <!-- INPUT -->

    <div class="input-wrap">

      <button
        class="tool-btn"
        onclick="pickFile()"
      >
        📎
      </button>

      <button
        class="tool-btn"
        id="voiceBtn"
      >
        🎤
      </button>

      <input
        id="msgInput"
        placeholder="Type message..."
      >

      <button
        class="send-btn"
        onclick="sendMsg()"
      >
        Send
      </button>

    </div>

  </div>

</div>

<input
  type="file"
  id="fileInput"
  hidden
>

<script type="module" src="./messages.js"></script>

<script type="module" src="./maintenance-check.js"></script>

</body>

</html>
