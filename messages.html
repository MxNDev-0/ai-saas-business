<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>MCN Messenger Neo</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial;
  background:#071028;
  color:white;
}

/* ================= APP ================= */

.app{
  width:100%;
  height:100vh;
  display:flex;
  position:relative;
  overflow:hidden;
}

/* ================= SIDEBAR ================= */

.sidebar{
  width:100%;
  max-width:380px;
  background:#0d1736;
  border-right:1px solid rgba(255,255,255,0.05);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
}

.topbar{
  height:70px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  background:#111c44;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
  font-size:22px;
  font-weight:bold;
}

.top-actions{
  display:flex;
  gap:10px;
}

.icon-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:12px;
  background:#1b2b5d;
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* ================= SEARCH ================= */

.search-wrap{
  padding:12px;
}

.search{
  width:100%;
  height:48px;
  border:none;
  outline:none;
  border-radius:14px;
  background:#131f49;
  color:white;
  padding:0 15px;
  font-size:15px;
}

/* ================= INBOX ================= */

.inbox{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.chat-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:16px;
  cursor:pointer;
  transition:0.2s;
  margin-bottom:8px;
}

.chat-item:hover{
  background:#16285d;
}

.avatar-wrap{
  position:relative;
}

.avatar{
  width:55px;
  height:55px;
  border-radius:50%;
  object-fit:cover;
}

.chat-info{
  flex:1;
  overflow:hidden;
}

.chat-name{
  font-size:15px;
  font-weight:bold;
  margin-bottom:5px;
}

.chat-preview{
  font-size:13px;
  opacity:0.7;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* ================= CHAT AREA ================= */

.chat-screen{
  flex:1;
  display:flex;
  flex-direction:column;
  background:#071028;
  position:relative;
}

/* ================= HEADER ================= */

.chat-header{
  height:70px;
  background:#111c44;
  border-bottom:1px solid rgba(255,255,255,0.05);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
}

.chat-user{
  display:flex;
  align-items:center;
  gap:12px;
}

.chat-user img{
  width:45px;
  height:45px;
  border-radius:50%;
}

.chat-user-info h3{
  font-size:15px;
}

.typing{
  font-size:12px;
  color:#5bc0be;
  margin-top:3px;
}

/* ================= CHAT BODY ================= */

.chat-body{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* ================= MESSAGE ================= */

.msg{
  max-width:78%;
  padding:12px;
  border-radius:18px;
  word-wrap:break-word;
  line-height:1.4;
}

.me{
  align-self:flex-end;
  background:#5bc0be;
  color:black;
  border-bottom-right-radius:6px;
}

.them{
  align-self:flex-start;
  background:#16285d;
  border-bottom-left-radius:6px;
}

/* ================= INPUT ================= */

.input-bar{
  min-height:75px;
  background:#111c44;
  border-top:1px solid rgba(255,255,255,0.05);
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
}

.input-actions{
  display:flex;
  gap:8px;
}

.msg-input{
  flex:1;
  height:48px;
  border:none;
  outline:none;
  border-radius:16px;
  background:#16285d;
  color:white;
  padding:0 15px;
  font-size:15px;
}

.send-btn{
  width:50px;
  height:50px;
  border:none;
  border-radius:16px;
  background:#5bc0be;
  color:black;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

/* ================= MOBILE ================= */

.mobile-back{
  display:none;
}

@media(max-width:900px){

  .sidebar{
    width:100%;
    max-width:none;
  }

  .chat-screen{
    position:absolute;
    top:0;
    left:100%;
    width:100%;
    height:100%;
    z-index:50;
    transition:0.25s ease;
  }

  .chat-screen.active{
    left:0;
  }

  .mobile-back{
    display:flex;
  }
}

</style>

</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="topbar">
      <div class="logo">Messages</div>

      <div class="top-actions">
        <button class="icon-btn">🔍</button>

        <button class="icon-btn"
          onclick="location.href='dashboard.html'">
          🏠
        </button>
      </div>
    </div>

    <div class="search-wrap">
      <input id="searchInput" class="search" placeholder="Search conversations...">
    </div>

    <!-- SINGLE INBOX TARGET (FIXED DUPLICATION SOURCE) -->
    <div id="inboxList" class="inbox"></div>

  </div>

  <!-- CHAT -->
  <div id="chatScreen" class="chat-screen">

    <div class="chat-header">

      <div class="chat-user">

        <button class="icon-btn mobile-back" onclick="closeChat()">←</button>

        <img id="chatAvatar" src="https://via.placeholder.com/100">

        <div class="chat-user-info">
          <h3 id="chatUsername">User</h3>
          <div id="typingIndicator" class="typing"></div>
        </div>

      </div>

      <div class="top-actions">
        <button class="icon-btn">📞</button>
        <button class="icon-btn">🗑</button>
      </div>

    </div>

    <div id="chatBox" class="chat-body"></div>

    <div class="input-bar">

      <div class="input-actions">
        <button class="icon-btn">📎</button>
        <button class="icon-btn">🎤</button>
      </div>

      <input id="msgInput" class="msg-input" placeholder="Type message...">

      <button class="send-btn" onclick="sendMsg()">➤</button>

    </div>

  </div>

</div>

<input type="file" id="fileInput" hidden/>

<script type="module" src="./messages.js"></script>
<script type="module" src="./maintenance-check.js"></script>

</body>
</html>
