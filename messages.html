<!DOCTYPE html>
<html>
<head>
  <title>Messages — MCN Engine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 10px;
      background: #1c2541;
    }

    .navbar h3 {
      margin: 0;
      text-align: center;
    }

    .back-btn {
      position: absolute;
      left: 10px;
      padding: 5px 10px;
      font-size: 14px;
      border-radius: 6px;
      border: none;
      background: #5bc0be;
    }

    .chat-box {
      height: 65vh;
      overflow-y: auto;
      padding: 10px;
      padding-bottom: 80px;
    }

    .msg {
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 8px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .me {
      background: #5bc0be;
      color: black;
      margin-left: auto;
    }

    .them {
      background: #1c2541;
    }

    .input-box {
      display: flex;
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #1c2541;
      padding: 10px;
      box-sizing: border-box;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #0b132b;
      color: white;
    }

    .send-btn {
      margin-left: 5px;
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      background: #5bc0be;
      white-space: nowrap;
      flex: none;
    }
  </style>
</head>

<body>

<div class="navbar">
  <button class="back-btn" onclick="goBack()">←</button>
  <h3>Messages</h3>
</div>

<div id="chatBox" class="chat-box"></div>

<div class="input-box">
  <input id="msgInput" placeholder="Type message...">
  <button class="send-btn" onclick="sendMsg()">Send</button>
</div>

<script type="module" src="messages.js"></script>

<script>
function goBack(){
  location.href = "dashboard.html";
}
</script>

</body>
</html>
