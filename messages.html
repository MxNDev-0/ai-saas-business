<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <title>MCN Messenger Ultra</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >

  <meta
    name="theme-color"
    content="#0b132b"
  >

  <link
    rel="manifest"
    href="./manifest.json"
  >

  <style>

    * {

      margin: 0;
      padding: 0;

      box-sizing: border-box;

      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {

      width: 100%;
      height: 100%;

      overflow: hidden;

      background: #0b132b;

      font-family: Arial, sans-serif;

      color: white;
    }

    body {

      position: fixed;

      inset: 0;
    }

    img {
      user-select: none;
    }

    button,
    input,
    textarea {
      font-family: inherit;
    }

    /* ================= APP ================= */

    .app {

      position: relative;

      width: 100%;
      height: 100%;

      overflow: hidden;
    }

    /* ================= INBOX ================= */

    .inbox-screen {

      position: absolute;

      inset: 0;

      display: flex;

      flex-direction: column;

      background: #0b132b;

      z-index: 1;

      transition:
        transform .25s ease,
        opacity .25s ease;
    }

    .inbox-screen.hidden {

      transform: scale(.98);

      opacity: 0;

      pointer-events: none;
    }

    /* ================= TOP ================= */

    .topbar {

      height: 65px;

      display: flex;

      align-items: center;

      justify-content: space-between;

      padding: 0 15px;

      background: #1c2541;

      border-bottom:
      1px solid rgba(255,255,255,0.05);
    }

    .top-title {

      font-size: 20px;

      font-weight: bold;
    }

    .top-actions {

      display: flex;

      gap: 10px;
    }

    .top-btn {

      width: 40px;
      height: 40px;

      border: none;

      border-radius: 12px;

      background: #243b67;

      color: white;

      font-size: 16px;
    }

    /* ================= SEARCH ================= */

    .search-wrap {

      padding: 10px;
    }

    .search {

      width: 100%;

      padding: 14px;

      border: none;

      border-radius: 15px;

      outline: none;

      background: #1c2541;

      color: white;

      font-size: 15px;
    }

    /* ================= INBOX LIST ================= */

    #inboxList {

      flex: 1;

      overflow-y: auto;

      padding: 10px;

      overscroll-behavior: contain;

      -webkit-overflow-scrolling: touch;
    }

    .chat-item {

      display: flex;

      align-items: center;

      gap: 12px;

      padding: 12px;

      margin-bottom: 10px;

      background: #16213e;

      border-radius: 18px;

      transition: .2s;
    }

    .chat-item:active {

      transform: scale(.98);
    }

    .avatar-wrap {

      position: relative;
    }

    .avatar {

      width: 54px;
      height: 54px;

      border-radius: 50%;

      object-fit: cover;
    }

    .online {

      width: 12px;
      height: 12px;

      background: #00ff88;

      border-radius: 50%;

      position: absolute;

      right: 2px;
      bottom: 2px;

      border: 2px solid #16213e;
    }

    .chat-info {

      flex: 1;

      min-width: 0;
    }

    .chat-name {

      font-weight: bold;

      margin-bottom: 5px;

      white-space: nowrap;

      overflow: hidden;

      text-overflow: ellipsis;
    }

    .chat-preview {

      font-size: 13px;

      opacity: .7;

      white-space: nowrap;

      overflow: hidden;

      text-overflow: ellipsis;
    }

    .chat-meta {

      display: flex;

      flex-direction: column;

      align-items: flex-end;

      gap: 6px;
    }

    .time {

      font-size: 11px;

      opacity: .6;
    }

    .badge {

      min-width: 22px;

      height: 22px;

      padding: 0 6px;

      border-radius: 999px;

      background: #5bc0be;

      color: black;

      font-size: 12px;

      font-weight: bold;

      display: flex;

      align-items: center;

      justify-content: center;
    }

    /* ================= CHAT ================= */

    .chat-screen {

      position: absolute;

      inset: 0;

      display: flex;

      flex-direction: column;

      background: #0b132b;

      z-index: 5;

      transform: translateX(100%);

      transition: transform .25s ease;
    }

    .chat-screen.active {

      transform: translateX(0);
    }

    /* ================= CHAT HEADER ================= */

    .chat-header {

      min-height: 65px;

      display: flex;

      align-items: center;

      gap: 10px;

      padding: 0 12px;

      background: #1c2541;

      border-bottom:
      1px solid rgba(255,255,255,0.05);
    }

    .back {

      width: 40px;
      height: 40px;

      border-radius: 12px;

      border: none;

      background: #243b67;

      color: white;

      font-size: 18px;
    }

    .chat-user {

      flex: 1;

      min-width: 0;
    }

    .chat-user-name {

      font-weight: bold;

      white-space: nowrap;

      overflow: hidden;

      text-overflow: ellipsis;
    }

    .typing {

      font-size: 12px;

      opacity: .7;

      margin-top: 3px;
    }

    .header-actions {

      display: flex;

      gap: 8px;
    }

    /* ================= CHAT BOX ================= */

    #chatBox {

      flex: 1;

      overflow-y: auto;

      padding: 14px;

      display: flex;

      flex-direction: column;

      gap: 8px;

      overscroll-behavior: contain;

      -webkit-overflow-scrolling: touch;
    }

    .msg {

      max-width: 82%;

      padding: 12px;

      border-radius: 18px;

      word-wrap: break-word;

      animation: pop .18s ease;
    }

    @keyframes pop {

      from {

        opacity: 0;

        transform: scale(.9);
      }

      to {

        opacity: 1;

        transform: scale(1);
      }
    }

    .me {

      align-self: flex-end;

      background: #5bc0be;

      color: black;

      border-bottom-right-radius: 6px;
    }

    .them {

      align-self: flex-start;

      background: #1c2541;

      border-bottom-left-radius: 6px;
    }

    .msg img {

      width: 100%;

      border-radius: 12px;

      margin-bottom: 8px;
    }

    .meta {

      margin-top: 5px;

      font-size: 10px;

      opacity: .7;

      text-align: right;
    }

    /* ================= INPUT ================= */

    .composer {

      padding: 10px;

      background: #1c2541;

      display: flex;

      align-items: center;

      gap: 8px;
    }

    .tool {

      width: 42px;
      height: 42px;

      border: none;

      border-radius: 12px;

      background: #243b67;

      color: white;

      font-size: 17px;
    }

    #msgInput {

      flex: 1;

      border: none;

      outline: none;

      border-radius: 16px;

      background: #0b132b;

      color: white;

      padding: 14px;

      font-size: 15px;
    }

    .send {

      border: none;

      background: #5bc0be;

      color: black;

      border-radius: 14px;

      padding: 13px 18px;

      font-weight: bold;
    }

  </style>

</head>

<body>

<div class="app">

  <!-- ================= INBOX ================= -->

  <div
    id="inboxScreen"
    class="inbox-screen"
  >

    <div class="topbar">

      <div class="top-title">
        Messages
      </div>

      <div class="top-actions">

        <button class="top-btn">
          🔍
        </button>

        <button class="top-btn">
          ⚙️
        </button>

      </div>

    </div>

    <div class="search-wrap">

      <input
        id="searchInput"
        class="search"
        placeholder="Search conversations..."
      >

    </div>

    <div id="inboxList"></div>

  </div>

  <!-- ================= CHAT ================= -->

  <div
    id="chatScreen"
    class="chat-screen"
  >

    <div class="chat-header">

      <button
        class="back"
        onclick="closeChat()"
      >
        ←
      </button>

      <img
        id="chatAvatar"
        class="avatar"
        src="https://via.placeholder.com/100"
      >

      <div class="chat-user">

        <div
          id="chatUsername"
          class="chat-user-name"
        >
          User
        </div>

        <div
          id="typingIndicator"
          class="typing"
        >
        </div>

      </div>

      <div class="header-actions">

        <button
          class="tool"
          onclick="startCall()"
        >
          📞
        </button>

        <button
          class="tool"
          onclick="deleteChat()"
        >
          🗑
        </button>

      </div>

    </div>

    <!-- ================= CHAT BOX ================= -->

    <div id="chatBox"></div>

    <!-- ================= COMPOSER ================= -->

    <div class="composer">

      <button
        class="tool"
        onclick="pickFile()"
      >
        📎
      </button>

      <button
        class="tool"
        id="voiceBtn"
      >
        🎤
      </button>

      <input
        id="msgInput"
        placeholder="Type message..."
      >

      <button
        class="send"
        onclick="sendMsg()"
      >
        Send
      </button>

    </div>

  </div>

</div>

<input
  type="file"
  id="fileInput"
  hidden
>

<script type="module" src="./messages.js"></script>

<script type="module" src="./maintenance-check.js"></script>

</body>

</html>
