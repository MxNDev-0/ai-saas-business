<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="ui-theme.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: #fff;
    }

    /* ================= HEADER (SWAPPED) ================= */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #1c2541;
      position: sticky;
      top: 0;
    }

    .navbar h3 {
      margin: 0;
      font-size: 16px;
      text-align: center;
      flex: 1;
    }

    .icon-btn {
      background: #5bc0be;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    /* LEFT BACK */
    .left {
      order: 0;
    }

    /* RIGHT MENU */
    .right {
      order: 2;
    }

    /* ================= CONTAINER ================= */
    .container {
      padding: 15px;
    }

    /* ================= FACEBOOK STYLE USER HEADER ================= */
    .profile-header {
      text-align: center;
      padding: 15px;
      margin-top: 10px;
      background: #1c2541;
      border-radius: 12px;
    }

    .profile-header .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #5bc0be;
      margin: auto;
      margin-bottom: 8px;
    }

    .profile-header .name {
      font-size: 18px;
      color: #5bc0be;
      font-weight: bold;
    }

    /* ================= FRIEND SYSTEM (TOP ORDER) ================= */
    .card {
      background: #1c2541;
      padding: 12px;
      border-radius: 12px;
      margin-top: 12px;
    }

    /* ================= POST ================= */
    .post {
      background: #0b132b;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      position: relative;
    }

    /* ONLY 3 DOTS */
    .dots {
      position: absolute;
      right: 8px;
      top: 8px;
      cursor: pointer;
      font-size: 18px;
    }

    .menu-box {
      position: absolute;
      right: 8px;
      top: 28px;
      background: #1c2541;
      border-radius: 8px;
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 5;
    }

    .menu-box button {
      background: none;
      border: none;
      color: white;
      padding: 8px;
      text-align: left;
      cursor: pointer;
      font-size: 12px;
    }

    .menu-box button:hover {
      background: #5bc0be;
      color: black;
    }

    /* SINGLE BACK BUTTON ONLY */
    .back-btn {
      margin-top: 10px;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 8px;
      background: #5bc0be;
      border: none;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="navbar">

  <!-- LEFT BACK -->
  <button class="icon-btn left" onclick="location.href='dashboard.html'">⬅</button>

  <h3>Profile</h3>

  <!-- RIGHT MENU -->
  <button class="icon-btn right" onclick="toggleMenu()">☰</button>

</div>

<div class="container">

  <!-- PROFILE HEADER (Facebook style username display) -->
  <div class="profile-header">
    <div class="avatar"></div>
    <div class="name" id="usernameDisplay">Loading...</div>
  </div>

  <!-- SINGLE BACK ONLY -->
  <button class="back-btn" onclick="location.href='dashboard.html'">
    Back
  </button>

  <!-- CREATE POST -->
  <div class="card">
    <h4>Create Post</h4>
    <textarea id="postInput" placeholder="Write something..."></textarea>

    <div style="display:flex;justify-content:flex-end;margin-top:10px;">
      <button onclick="createPost()">Post</button>
    </div>
  </div>

  <!-- POSTS -->
  <div class="card">
    <h4>My Posts</h4>
    <div id="myPosts"></div>
  </div>

  <!-- FRIEND REQUESTS (TOP STYLE) -->
  <div class="card">
    <h4>👥 Friend Requests</h4>
    <div id="friendRequestsBox"></div>
  </div>

  <!-- FRIENDS -->
  <div class="card">
    <h4>👤 Friends</h4>
    <div id="friendsBox"></div>
  </div>

</div>

<script type="module" src="profile.js"></script>
</body>
</html>
