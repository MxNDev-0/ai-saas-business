<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCN Profile</title>
<style>
body { font-family: Arial; margin: 0; background:#f5f5f5; }
.profile { max-width:500px; margin:auto; background:#fff; padding:20px; }
.cover { height:120px; background:#ddd; }
.avatar { width:90px; height:90px; border-radius:50%; margin-top:-45px; border:3px solid #fff; }
.stats { display:flex; justify-content:space-around; margin:10px 0; }
button { padding:8px 12px; }
</style>
</head>
<body>

<div class="profile">
  <div class="cover"></div>

  <img id="avatar" class="avatar" src="default.png">

  <h2 id="name">User</h2>
  <p id="username">@username</p>
  <p id="bio">Bio...</p>

  <div class="stats">
    <div id="followers">0 Followers</div>
    <div id="following">0 Following</div>
  </div>

  <button id="followBtn">Follow</button>

</div>

<script src="profile.js"></script>
</body>
</html>
