<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCN Profile Neo v3</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #eef1f5;
  display: flex;
  justify-content: center;
}

.profile {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  background: white;
  padding: 15px;
  box-sizing: border-box;
}

.cover {
  height: 140px;
  background: linear-gradient(135deg, #4a90e2, #6c5ce7);
  border-radius: 10px;
}

.avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  margin-top: -45px;
  border: 3px solid white;
  object-fit: cover;
  background: #ddd;
}

h2, p {
  margin: 5px 0;
}

.stats {
  display: flex;
  justify-content: space-between;
  margin: 15px 0;
  font-weight: bold;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  background: #4a90e2;
  color: white;
  border-radius: 8px;
}

.loading {
  text-align: center;
  padding: 20px;
  color: gray;
}
</style>
</head>
<body>

<div class="profile">

  <div class="cover"></div>

  <div class="loading" id="loading">Loading profile...</div>

  <img id="avatar" class="avatar" src="" style="display:none;">

  <h2 id="name"></h2>
  <p id="username"></p>
  <p id="bio"></p>

  <div class="stats">
    <div id="followers"></div>
    <div id="following"></div>
  </div>

  <button id="followBtn">Follow</button>

</div>

<script type="module" src="profile.js"></script>
</body>
</html>
