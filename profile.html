<!DOCTYPE html>
<html>
<head>

  <title>MCN Engine Profile</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    body{
      margin:0;
      background:#0b132b;
      color:white;
      font-family:Arial;
    }

    .navbar{
      background:#1c2541;
      padding:14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .back-btn{
      background:#5bc0be;
      border:none;
      padding:8px 12px;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }

    .profile-card{
      padding:20px;
      text-align:center;
    }

    .avatar{
      width:110px;
      height:110px;
      border-radius:50%;
      object-fit:cover;
      border:4px solid #5bc0be;
      background:#1c2541;
    }

    .username{
      font-size:22px;
      margin-top:10px;
      font-weight:bold;
    }

    .email{
      color:#aaa;
      font-size:13px;
      margin-top:4px;
    }

    .bio{
      margin-top:15px;
      color:#ddd;
      line-height:1.5;
      padding:0 15px;
    }

    .stats{
      display:flex;
      justify-content:center;
      gap:20px;
      margin-top:20px;
      flex-wrap:wrap;
    }

    .stat{
      background:#1c2541;
      padding:12px;
      border-radius:12px;
      min-width:80px;
    }

    .stat b{
      display:block;
      font-size:18px;
      color:#5bc0be;
    }

    .actions{
      display:flex;
      gap:10px;
      padding:15px;
      justify-content:center;
      flex-wrap:wrap;
    }

    button{
      border:none;
      padding:12px 16px;
      border-radius:10px;
      background:#5bc0be;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

    .card{
      background:#1c2541;
      margin:15px;
      padding:15px;
      border-radius:16px;
    }

    input, textarea{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:10px;
      background:#0b132b;
      color:white;
      box-sizing:border-box;
    }

    textarea{
      min-height:90px;
      resize:none;
    }

    .monitor{
      background:black;
      color:#00ff88;
      font-family:monospace;
      height:150px;
      overflow-y:auto;
      border-radius:10px;
      padding:10px;
      margin-top:10px;
    }

  </style>

</head>

<body>

<div class="navbar">

  <button
    class="back-btn"
    onclick="location.href='dashboard.html'"
  >
    ← Back
  </button>

  <h3>Profile</h3>

  <div></div>

</div>

<div class="profile-card">

  <img
    id="avatar"
    class="avatar"
    src="https://via.placeholder.com/150"
  >

  <div id="username" class="username">
    Loading...
  </div>

  <div id="email" class="email"></div>

  <div id="bio" class="bio">
    No bio yet
  </div>

  <div class="stats">

    <div class="stat">
      <b id="postsCount">0</b>
      Posts
    </div>

    <div class="stat">
      <b id="followersCount">0</b>
      Followers
    </div>

    <div class="stat">
      <b id="followingCount">0</b>
      Following
    </div>

  </div>

</div>

<div class="actions">

  <button onclick="toggleEdit()">
    ✏ Edit Profile
  </button>

  <button onclick="openMessages()">
    ✉ Messages
  </button>

</div>

<div
  id="editCard"
  class="card"
  style="display:none;"
>

  <h3>Edit Profile</h3>

  <input
    id="editUsername"
    placeholder="Username"
  >

  <input
    id="editAvatar"
    placeholder="Avatar Image URL"
  >

  <textarea
    id="editBio"
    placeholder="Bio"
  ></textarea>

  <button onclick="saveProfile()">
    Save Profile
  </button>

</div>

<div class="card">

  <h3>🖥 Profile Monitor</h3>

  <div id="monitor" class="monitor"></div>

</div>

<script type="module" src="./profile.js"></script>

<script type="module" src="./maintenance-check.js"></script>

</body>
</html>
