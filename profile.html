<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>MCN Engine Profile</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#071028;
  color:white;
  font-family:Arial,sans-serif;
  min-height:100vh;
}

/* ================= TOPBAR ================= */

.topbar{
  height:65px;
  background:#101935;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  position:sticky;
  top:0;
  z-index:1000;
}

.icon-btn{
  width:46px;
  height:46px;
  border:none;
  border-radius:14px;
  background:#5bc0be;
  color:black;
  font-size:18px;
  font-weight:bold;
}

/* ================= PROFILE HEADER ================= */

.profile-header{
  position:relative;
  padding-bottom:30px;
  background:#101935;
  border-bottom-left-radius:28px;
  border-bottom-right-radius:28px;
}

.cover{
  height:180px;
  background:linear-gradient(
    135deg,
    #5bc0be,
    #1c2541
  );
}

.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  border:5px solid #071028;
  overflow:hidden;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  top:110px;
  background:#1c2541;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  font-weight:bold;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.profile-info{
  margin-top:75px;
  text-align:center;
  padding:0 20px;
}

.username{
  font-size:34px;
  font-weight:bold;
  margin-bottom:10px;
}

.bio{
  color:#aaa;
  line-height:1.5;
  margin-bottom:25px;
}

/* ================= STATS ================= */

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:20px;
}

.stat{
  background:#16213e;
  padding:16px 10px;
  border-radius:18px;
}

.stat-number{
  color:#5bc0be;
  font-size:22px;
  font-weight:bold;
  margin-bottom:5px;
}

/* ================= ACTION BUTTONS ================= */

.actions{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.action-btn{
  flex:1;
  border:none;
  padding:15px;
  border-radius:16px;
  font-weight:bold;
  font-size:15px;
}

.primary{
  background:#5bc0be;
  color:black;
}

.secondary{
  background:#1c2541;
  color:white;
}

/* ================= SECTION ================= */

.section{
  padding:15px;
}

.card{
  background:#111b36;
  padding:18px;
  border-radius:22px;
  margin-bottom:18px;
}

.section-title{
  font-size:18px;
  font-weight:bold;
  margin-bottom:18px;
}

/* ================= USERS ================= */

.user-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#16213e;
  padding:14px;
  border-radius:14px;
  margin-bottom:12px;
}

.user-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.online-dot{
  width:10px;
  height:10px;
  background:#00ff88;
  border-radius:50%;
}

.offline-dot{
  width:10px;
  height:10px;
  background:gray;
  border-radius:50%;
}

.user-btn{
  border:none;
  background:#5bc0be;
  color:black;
  padding:10px 14px;
  border-radius:10px;
  font-weight:bold;
}

/* ================= POSTS ================= */

.post-box{
  background:#16213e;
  padding:15px;
  border-radius:16px;
  margin-bottom:14px;
}

textarea{
  width:100%;
  min-height:120px;
  padding:15px;
  border-radius:16px;
  background:#16213e;
  color:white;
  border:none;
  resize:none;
  font-size:15px;
  margin-bottom:15px;
}

textarea:focus{
  outline:none;
}

/* ================= POST BUTTON FIX ================= */

.post-action{
  display:flex;
  justify-content:flex-end;
}

.post-btn{
  border:none;
  background:#5bc0be;
  color:black;
  padding:14px 24px;
  border-radius:14px;
  font-weight:bold;
  font-size:15px;
}

/* ================= EMPTY ================= */

.empty{
  opacity:0.7;
  text-align:center;
  padding:20px;
}

.private-box{
  background:#1c2541;
  padding:20px;
  border-radius:15px;
  text-align:center;
}

/* ================= MOBILE ================= */

@media(max-width:480px){

  .username{
    font-size:28px;
  }

  .stats{
    grid-template-columns:
      repeat(2,1fr);
  }

}

</style>

</head>

<body>

<!-- ================= TOPBAR ================= -->

<div class="topbar">

  <button
    class="icon-btn"
    onclick="goBack()"
  >
    ←
  </button>

  <div id="topUsername">
    Profile
  </div>

  <button
    class="icon-btn"
    onclick="location.href='dashboard.html'"
  >
    🏠
  </button>

</div>

<!-- ================= PROFILE ================= -->

<div class="profile-header">

  <div
    class="cover"
    id="coverPhoto"
  ></div>

  <div
    class="avatar"
    id="avatar"
  >
    U
  </div>

  <div class="profile-info">

    <div
      class="username"
      id="username"
    >
      Username
    </div>

    <div
      class="bio"
      id="bio"
    >
      User bio...
    </div>

    <!-- ================= STATS ================= -->

    <div class="stats">

      <div class="stat">

        <div
          class="stat-number"
          id="postsCount"
        >
          0
        </div>

        <div>Posts</div>

      </div>

      <div class="stat">

        <div
          class="stat-number"
          id="followersCount"
        >
          0
        </div>

        <div>Followers</div>

      </div>

      <div class="stat">

        <div
          class="stat-number"
          id="followingCount"
        >
          0
        </div>

        <div>Following</div>

      </div>

      <div class="stat">

        <div
          class="stat-number"
          id="likesCount"
        >
          0
        </div>

        <div>Likes</div>

      </div>

    </div>

    <!-- ================= OWNER ACTIONS ================= -->

    <div
      class="actions"
      id="ownerActions"
    >

      <button
        class="action-btn primary"
        onclick="editProfile()"
      >
        Edit Profile
      </button>

      <button
        class="action-btn secondary"
        onclick="location.href='messages.html'"
      >
        Messages
      </button>

    </div>

    <!-- ================= VISITOR ACTIONS ================= -->

    <div
      class="actions"
      id="visitorActions"
      style="display:none;"
    >

      <button
        class="action-btn primary"
      >
        Follow
      </button>

      <button
        class="action-btn secondary"
        onclick="messageUser()"
      >
        Message
      </button>

    </div>

  </div>

</div>

<!-- ================= MAIN SECTION ================= -->

<div class="section">

  <!-- ================= ACTIVITY ================= -->

  <div class="card">

    <div class="section-title">
      📌 Activity
    </div>

    <div id="postCreator">

      <textarea
        id="timelinePost"
        placeholder="What's on your mind?"
      ></textarea>

      <div class="post-action">

        <button
          class="post-btn"
          onclick="createTimelinePost()"
        >
          Post
        </button>

      </div>

    </div>

    <div
      id="timelinePosts"
      style="margin-top:20px;"
    ></div>

  </div>

  <!-- ================= ONLINE USERS ================= -->

  <div class="card">

    <div class="section-title">
      🟢 Online Users
    </div>

    <div id="onlineUsers">

      <div class="empty">
        Loading online users...
      </div>

    </div>

  </div>

  <!-- ================= SUGGESTED USERS ================= -->

  <div class="card">

    <div class="section-title">
      👥 Suggested Users
    </div>

    <div id="suggestedUsers">

      <div class="empty">
        Loading users...
      </div>

    </div>

  </div>

</div>

<script
  type="module"
  src="./profile.js"
></script>

</body>
</html>
