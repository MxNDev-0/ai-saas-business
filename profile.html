<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #1c2541;
      padding: 12px;
    }

    .back-btn {
      position: absolute;
      left: 10px;
      background: #5bc0be;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .monitor {
      background: #000;
      height: 150px;
      overflow-y: auto;
      font-family: monospace;
      padding: 10px;
      border-radius: 12px;
      margin: 10px;
      color: #00ff9c;
    }

    .chat-input {
      display: flex;
      margin: 10px;
      gap: 5px;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
    }

    .chat-input button {
      padding: 10px;
    }

    .card {
      background: #1c2541;
      margin: 10px;
      padding: 10px;
      border-radius: 12px;
    }

    .online-screen {
      background: #000;
      border-radius: 10px;
      padding: 8px;
      font-family: monospace;
      max-height: 220px;
      overflow-y: auto;
    }

    .user-row {
      display: flex;
      justify-content: space-between;
      padding: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .user-left {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #00ff88;
      border-radius: 50%;
    }

    .user-actions button {
      font-size: 11px;
      padding: 3px 6px;
      border-radius: 6px;
      border: none;
    }
  </style>
</head>

<body>

<div class="navbar">
  <button class="back-btn" onclick="location.href='dashboard.html'">←</button>
  <h3>Profile</h3>
</div>

<div id="monitor" class="monitor">
[SYSTEM] Profile monitor started...
</div>

<!-- 🔥 CHAT INPUT (RESTORED) -->
<div class="chat-input">
  <input id="monitorInput" placeholder="Type command...">
  <button onclick="sendMonitorMsg()">Send</button>
</div>

<div class="card">
  <div>● ONLINE USERS</div>
  <div id="onlineUsers" class="online-screen"></div>
</div>

<script type="module" src="profile.js"></script>

</body>
</html>
