<!DOCTYPE html>
<html>
<head>
  <title>MCN Engine Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1c2541;
      padding: 10px;
    }

    .icon-btn {
      background: #5bc0be;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .monitor {
      background: #000;
      font-size: 13px;
      height: 120px;
      overflow-y: auto;
      font-family: monospace;
      padding: 10px;
      border-radius: 12px;
      margin: 10px;
    }

    .profile-header {
      display: flex;
      align-items: center;
      background: #1c2541;
      margin: 10px;
      padding: 10px;
      border-radius: 12px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #5bc0be;
    }

    .username {
      margin-left: 10px;
      color: #5bc0be;
      font-weight: bold;
    }

    .card {
      background: #1c2541;
      margin: 10px;
      padding: 10px;
      border-radius: 12px;
    }

    /* 🔥 ONLINE USERS FIX */
    .user-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f1a2f;
      padding: 8px 10px;
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .user-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      background: #00ff88;
      border-radius: 50%;
    }

    .name {
      font-size: 14px;
    }

    .user-actions {
      display: flex;
      gap: 6px;
    }

    .user-actions button {
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .btn-add {
      background: #5bc0be;
    }

    .btn-msg {
      background: #3a86ff;
      color: white;
    }
  </style>
</head>

<body>

<div class="navbar">
  <button class="icon-btn" onclick="location.href='dashboard.html'">Back</button>
  <h3>Profile</h3>
</div>

<div id="monitor" class="monitor">
  [SYSTEM] Profile monitor started...
</div>

<div class="profile-header">
  <div class="avatar"></div>
  <div class="username">Online Users</div>
</div>

<div class="card">
  <div id="onlineUsers"></div>
</div>

<script type="module" src="profile.js"></script>

</body>
</html>
