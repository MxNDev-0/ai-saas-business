<!DOCTYPE html>
<html>
<head>
  <title>Contact — MCN Engine</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="theme-color" content="#5bc0be">

  <style>
    body{
      margin:0;
      background:#0b132b;
      color:white;
      font-family:Arial;
      padding:20px;
    }

    .topbar{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
    }

    .back-btn{
      background:#1c2541;
      color:#5bc0be;
      border:none;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    h1{
      margin:0;
      color:#5bc0be;
    }

    .card{
      background:linear-gradient(145deg,#1c2541,#141b2e);
      padding:20px;
      border-radius:18px;
      margin-bottom:18px;
      border:1px solid rgba(255,255,255,0.05);
    }

    .label{
      color:#5bc0be;
      font-size:13px;
      margin-bottom:8px;
      display:block;
    }

    a{
      color:#5bc0be;
      text-decoration:none;
      word-break:break-word;
    }

    p{
      color:#ccc;
      line-height:1.6;
    }
  </style>
</head>

<body>

<div class="topbar">
  <button class="back-btn" onclick="goBack()">
    ← Back
  </button>

  <h1>Contact</h1>
</div>

<div class="card">

  <span class="label">📧 Email</span>

  <a href="mailto:mcnengine@gmail.com">
    mcnengine@gmail.com
  </a>

</div>

<div class="card">

  <span class="label">🌐 Website</span>

  <p>
    MCN Engine — Discover, Learn, Explore.
  </p>

</div>

<div class="card">

  <span class="label">🚀 Future Upgrade</span>

  <p>
    When your domain is ready,
    you can upgrade this email to:
  </p>

  <p>
    contact@yourdomain.com
  </p>

</div>

<script>
function goBack(){
  window.history.back();
}
</script>

</body>
</html>
